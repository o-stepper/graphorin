            - heading "FAQ" [level=2] [ref=e597]
            - heading "What is the best AI agent framework in 2026?" [level=3] [ref=e598]
            - paragraph [ref=e599]: There is no single best. Claude Agent SDK for coding agents with deep OS access. OpenAI Agents SDK for lightweight handoff chains. Google ADK for multi-language enterprise systems. LangGraph for stateful workflows with persistence. CrewAI for rapid prototyping. Microsoft Agent Framework 1.0 (GA April 3, 2026) for .NET and Azure. The best framework is the one that matches your specific orchestration pattern and deployment constraints.
            - heading "What AI agent frameworks were released or updated in 2026?" [level=3] [ref=e600]
            - paragraph [ref=e601]: Microsoft Agent Framework reached RC on February 19, 2026 and 1.0 GA on April 3, 2026, unifying AutoGen and Semantic Kernel with native MCP and A2A. Google shipped ADK Java 1.0 and Go 1.0 in early 2026, giving it four language SDKs. CrewAI reached 1.14.6 (52.4k stars) by May 2026. Anthropic's Claude Agent SDK began drawing subscription usage from a separate monthly Agent SDK credit on June 15, 2026.
            - heading "What are the core primitives of the Claude Agent SDK?" [level=3] [ref=e602]
            - paragraph [ref=e603]:
              - text: The core primitive is the async
              - code [ref=e604]: query()
              - text: generator that you iterate for streamed messages. Built-in tools include Read, Write, Edit, Bash, Glob, Grep, WebSearch, WebFetch, and AskUserQuestion, scoped through
              - code [ref=e605]: allowedTools
              - text: . Lifecycle hooks (PreToolUse, PostToolUse, Stop, SessionStart, SessionEnd, UserPromptSubmit) are in-process callbacks registered on
              - code [ref=e606]: options.hooks
              - text: . Subagents are defined on
              - code [ref=e607]: options.agents
              - text: with their own context window and tools, and MCP servers attach via
              - code [ref=e608]: options.mcpServers
              - text: . See the primitive reference section above for the full schema, streaming, and isolation details.
            - heading "What is the difference between MCP, ACP, and A2A?" [level=3] [ref=e609]
            - paragraph [ref=e610]: "MCP (Model Context Protocol) handles vertical integration: connecting AI models to tools and data sources via JSON-RPC. A2A (Agent-to-Agent Protocol) handles horizontal integration: agents discovering each other and delegating tasks via Agent Cards and REST endpoints. ACP (Agent Communication Protocol) was IBM's REST-native standard for agent communication that merged into A2A under the Linux Foundation in late 2025. Use MCP for tool access. Use A2A for agent-to-agent coordination."
            - heading "Which AI agent frameworks support MCP?" [level=3] [ref=e611]
            - paragraph [ref=e612]: Claude Agent SDK has the deepest MCP integration. CrewAI supports MCP natively. LangGraph and Google ADK integrate MCP via adapters. OpenAI adopted MCP across its products. Smolagents supports MCP tool servers. Most major frameworks have some MCP compatibility, but depth of integration varies significantly.
            - heading "Should I use a provider-native SDK or an independent framework?" [level=3] [ref=e613]
            - paragraph [ref=e614]: Provider-native SDKs (Claude, OpenAI, Google) offer tighter model integration and simpler setup but create vendor lock-in. Independent frameworks (LangGraph, CrewAI, Smolagents) give model flexibility but add abstraction layers. For production systems where you need to swap models, use an independent framework. For maximum integration depth with one provider, use their native SDK.
            - heading "Is ACP still relevant after merging with A2A?" [level=3] [ref=e615]
            - paragraph [ref=e616]: ACP as a standalone protocol is no longer actively developed. Its contributions (RESTful simplicity, multimodal messaging) live on inside the A2A specification. New projects should target A2A directly. If you built on ACP, the migration path to A2A preserves the REST patterns you were already using.
            - heading "How do I choose between LangGraph and CrewAI?" [level=3] [ref=e617]
            - paragraph [ref=e618]: LangGraph for complex workflows where you need persistence, checkpointing, crash recovery, and fine-grained control over execution flow. CrewAI for rapid prototyping where the team/role metaphor maps naturally to your problem. LangGraph requires more upfront design. CrewAI gets you to a working prototype faster. Many teams prototype in CrewAI and migrate to LangGraph for production.
