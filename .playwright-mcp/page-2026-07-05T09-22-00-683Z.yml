          - generic [ref=e184]:
            - heading "1. Claude Agent SDK (Anthropic)" [level=2] [ref=e185]
            - paragraph [ref=e186]: "Anthropic renamed the Claude Code SDK to the Claude Agent SDK in early 2026. The rename reflects a broader ambition: the SDK builds agents that go beyond code. Email assistants, research agents, customer support bots, finance analyzers. But the core design philosophy remains the same: give the agent a computer."
            - paragraph [ref=e187]:
              - text: The SDK provides built-in tools for file system and shell access, eliminating the boilerplate that other frameworks require. Its MCP integration is the deepest of any framework. Playwright, Slack, GitHub, and hundreds of other MCP servers connect with a single configuration line. The
              - code [ref=e188]: "@tool"
              - text: decorator supports
              - code [ref=e189]: typing.Annotated
              - text: for per-parameter descriptions, which means your tool schemas stay close to your function signatures.
            - heading "Architecture" [level=3] [ref=e190]
            - paragraph [ref=e191]: Claude Agent SDK centers on hooks and subagents. Hooks intercept agent behavior at lifecycle points (before tool calls, after responses, on errors). Subagents handle task delegation through child agents, each with their own context window and tool set. This gives precise control over what an agent can and cannot do, which matters in production where unconstrained agents are a liability.
            - heading "Strengths" [level=3] [ref=e192]
            - list [ref=e193]:
              - listitem [ref=e194]: "Deepest MCP integration of any framework: 200+ servers, single-line config"
              - listitem [ref=e195]: Built-in file system and shell access (no custom tool wrappers needed)
              - listitem [ref=e196]: Extended thinking for complex reasoning chains
              - listitem [ref=e197]: Hooks system for lifecycle control (pre-tool, post-response, error handling)
              - listitem [ref=e198]: Session management with custom session IDs and context usage tracking
            - heading "Weaknesses" [level=3] [ref=e199]
            - list [ref=e200]:
              - listitem [ref=e201]: Locked to Claude models (no model swapping without rewriting tool schemas)
              - listitem [ref=e202]: No native A2A/ACP support for cross-vendor agent communication
              - listitem [ref=e203]: Python and TypeScript only (no Java, Go, or .NET)
            - paragraph [ref=e204]:
              - strong [ref=e205]: "When to use:"
              - text: You are building coding agents, research agents, or any system that needs deep OS-level access. You want the simplest path from "I have an idea" to "the agent is editing files and running commands." You are committed to Claude models.
          - generic [ref=e206]:
            - 'heading "Claude Agent SDK Primitive Reference: Core Primitives, Lifecycle, Hooks, Schema, Streaming" [level=2] [ref=e207]'
            - paragraph [ref=e208]: Most framework comparisons stop at "Claude Agent SDK is good for coding." This section is the documentation-grade reference for the primitives, lifecycle, governance schema, streaming model, agent isolation, and token handling, verified against code.claude.com docs as of June 2026.
