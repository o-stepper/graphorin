                - heading "Conversations (debate)" [level=3] [ref=e512]:
                  - generic [ref=e513]: Conversations (debate)
                - paragraph [ref=e514]: Agents discuss in a group chat, debating until they reach consensus. AutoGen's pattern. Produces high-quality outputs through deliberation, but costs 20+ LLM calls per interaction.
            - paragraph [ref=e515]: "Anthropic's research found multi-agent architectures outperform single-agent benchmarks by up to 90% when parallel sub-agents are coordinated by a lead planner. Cognition measured that coding agents spend 60% of their time on search, not generation. These numbers argue for specialization: a search agent, a generation agent, and an orchestrator."
            - paragraph [ref=e516]: The pattern you choose determines your cost profile. Subagents are cheap (one LLM call per delegation). Conversations are expensive (N agents x M rounds). Handoffs land in the middle. Match the pattern to the problem, not the other way around.
