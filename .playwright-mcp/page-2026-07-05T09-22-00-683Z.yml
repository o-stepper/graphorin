          - generic [ref=e291]:
            - heading "2. OpenAI Agents SDK" [level=2] [ref=e292]
            - paragraph [ref=e293]: "OpenAI shipped the Agents SDK in March 2025 as Swarm's production successor. Where Swarm was an experimental sketch of multi-agent patterns, the Agents SDK is what you deploy. The core primitives: Agents (LLMs with instructions and tools), Handoffs (transferring control between agents), Guardrails (input/output validation), and Tracing (built-in debugging)."
            - paragraph [ref=e294]:
              - text: The handoff model is the cleanest in the ecosystem. When Agent A decides to delegate to Agent B, it executes a specialized tool call (
              - code [ref=e295]: transfer_to_agent_b
              - text: ) that passes control along with conversation history. No shared state bus, no message queues. The simplicity is the point.
            - heading "Architecture" [level=3] [ref=e296]
            - paragraph [ref=e297]: "The SDK runs an agentic loop: the agent receives input, calls tools or makes handoffs, and the loop continues until the agent produces a final output or a guardrail trips. Guardrails run in parallel with agent execution by default. If a guardrail fails, execution stops immediately, even mid-generation. Three guardrail types: input (validates user messages), output (validates final responses), and tool (wraps individual tool calls)."
            - heading "Strengths" [level=3] [ref=e298]
            - list [ref=e299]:
              - listitem [ref=e300]: "Cleanest handoff model: agent-to-agent delegation as typed tool calls"
              - listitem [ref=e301]: Three-tier guardrails (input, output, tool) running in parallel by default
              - listitem [ref=e302]: Built-in tracing with the OpenAI Traces dashboard for debugging
              - listitem [ref=e303]: Voice agent support via gpt-realtime with interruption detection
              - listitem [ref=e304]: "Lightweight: very few abstractions, fast to prototype"
            - heading "Weaknesses" [level=3] [ref=e305]
            - list [ref=e306]:
              - listitem [ref=e307]: No built-in state persistence (you manage checkpointing yourself)
              - listitem [ref=e308]: Handoffs are linear chains, not arbitrary graph topologies
              - listitem [ref=e309]: No native A2A support for cross-vendor agent discovery
              - listitem [ref=e310]: Voice features lock you into OpenAI-specific models
            - paragraph [ref=e311]:
              - strong [ref=e312]: "When to use:"
              - text: You need a lightweight framework where multi-agent coordination is handled through explicit handoffs, not complex orchestration graphs. Customer service routing, triage systems, and pipeline-style workflows where Agent A always hands off to Agent B or Agent C.
          - generic [ref=e313]:
            - heading "3. Google ADK (Agent Development Kit)" [level=2] [ref=e314]
            - paragraph [ref=e315]: "Google ADK launched with a clear thesis: agent development should feel like software development. The framework is model-agnostic and deployment-agnostic, though it is optimized for Gemini and the Google Cloud ecosystem. What sets it apart: four language SDKs (Python, TypeScript, Java, Go), native A2A support, and a visual Agent Designer in the Google Cloud console."
            - paragraph [ref=e316]: ADK Java 1.0 and ADK Go 1.0 both shipped in early 2026. This matters because most AI agent frameworks are Python-only, which forces enterprise Java and Go teams to maintain separate stacks. ADK lets a Python agent talk to a Java agent via A2A without either side knowing the other's language.
            - heading "Architecture" [level=3] [ref=e317]
            - paragraph [ref=e318]:
              - text: ADK builds hierarchical agent trees. A parent agent delegates to child agents, each with their own tools and capabilities. The
              - code [ref=e319]: to_a2a()
              - text: function auto-generates Agent Cards (JSON capability descriptions) from your ADK agent, enabling discovery by external agents. The Agent Designer provides low-code visual design for prototyping before transitioning to code.
            - heading "Strengths" [level=3] [ref=e320]
            - list [ref=e321]:
              - listitem [ref=e322]: "Four language SDKs: Python, TypeScript, Java, Go (widest language support)"
              - listitem [ref=e323]: Native A2A protocol with auto-generated Agent Cards
              - listitem [ref=e324]: Agent Designer for visual low-code prototyping
              - listitem [ref=e325]: OpenTelemetry integration for distributed tracing
              - listitem [ref=e326]: Deploys to Vertex AI Agent Engine for managed scaling
            - heading "Weaknesses" [level=3] [ref=e327]
            - list [ref=e328]:
              - listitem [ref=e329]: Heavy Google Cloud dependency for production deployments
              - listitem [ref=e330]: More manual plumbing for security compared to provider-native SDKs
              - listitem [ref=e331]: MCP support is through adapters, not native integration
              - listitem [ref=e332]: Community is smaller than LangChain or CrewAI ecosystems
            - paragraph [ref=e333]:
              - strong [ref=e334]: "When to use:"
              - text: Enterprise teams that need multi-language agent systems. Organizations already on Google Cloud. Any project that requires cross-vendor agent discovery via A2A. If your agents need to advertise capabilities and be discovered by agents you did not build, ADK's A2A support is the most mature.
          - generic [ref=e335]:
            - heading "4. LangGraph (LangChain)" [level=2] [ref=e336]
            - paragraph [ref=e337]: LangGraph treats agents as state machines. Nodes are functions. Edges are transitions (conditional or unconditional). State is immutable and checkpointed after every step. This is the framework you reach for when your agent workflow has branches, retries, human approval gates, and needs to survive server restarts.
            - paragraph [ref=e338]: The persistence layer is the real differentiator. MemorySaver, SqliteSaver, and PostgresSaver checkpoint state after every node execution. If your agent crashes mid-workflow, it resumes from the last checkpoint. Time-travel debugging lets you roll back to any previous state and replay with different parameters. No other framework in this list offers comparable crash recovery out of the box.
            - heading "Architecture" [level=3] [ref=e339]
            - paragraph [ref=e340]: Directed acyclic graphs (or cyclic, if your workflow loops) with typed state that flows through nodes. Each node can modify state, call tools, or invoke sub-graphs. Conditional edges route based on state values. LangSmith provides observability with trace visualization, token tracking, and latency breakdowns.
            - heading "Strengths" [level=3] [ref=e341]
            - list [ref=e342]:
              - listitem [ref=e343]: Persistent checkpointing with automatic crash recovery
              - listitem [ref=e344]: "Time-travel debugging: roll back and replay from any state"
              - listitem [ref=e345]: Graph visualization for complex multi-step workflows
              - listitem [ref=e346]: Human-in-the-loop gates at any node (pause, wait for approval, resume)
              - listitem [ref=e347]: LangSmith observability with tracing, evaluation, and monitoring
            - heading "Weaknesses" [level=3] [ref=e348]
            - list [ref=e349]:
              - listitem [ref=e350]: Overkill for simple single-agent use cases
              - listitem [ref=e351]: Graph-based design requires more upfront architectural thinking
              - listitem [ref=e352]: LangChain dependency adds weight (you get the full abstraction stack)
              - listitem [ref=e353]: Debugging graph state transitions is harder than debugging linear code
            - paragraph [ref=e354]:
              - strong [ref=e355]: "When to use:"
              - text: Complex workflows with branching logic, retries, and human approval steps. Document review pipelines, multi-step research tasks, or any agent system where "what happens when it crashes at step 7 of 12" is a real concern. If you need checkpointing and recovery, LangGraph is the default choice.
          - generic [ref=e356]:
            - heading "5. CrewAI" [level=2] [ref=e357]
            - paragraph [ref=e358]: CrewAI models multi-agent collaboration as a team. You define agents with roles, backstories, and goals, then assemble them into a crew with tasks. A Researcher agent gathers data. A Writer agent drafts content. A Reviewer agent checks quality. The metaphor is intuitive, and that is both its strength and its limitation.
            - paragraph [ref=e359]:
              - text: At 52,400+ GitHub stars and roughly 5 million monthly downloads (27 million-plus on PyPI overall), CrewAI has the largest community among multi-agent frameworks. Version 1.14.6 (May 2026) ships native MCP support through
              - code [ref=e360]: crewai-tools[mcp]
              - text: and A2A task delegation. The framework manages connection lifecycle, transport negotiation (Stdio, SSE, Streamable HTTPS), and tool discovery automatically.
            - heading "Architecture" [level=3] [ref=e361]
            - paragraph [ref=e362]: "Role-based agents execute sequential or parallel tasks within a crew. The framework handles task dependency resolution: if Task B depends on Task A's output, CrewAI ensures execution order. A2A support allows agents in one crew to delegate to agents in another, which is useful when different teams maintain different agent systems."
            - heading "Strengths" [level=3] [ref=e363]
            - list [ref=e364]:
              - listitem [ref=e365]: "Fastest setup: define agents with natural language role descriptions"
              - listitem [ref=e366]: Native MCP and A2A protocol support
              - listitem [ref=e367]: 52,400+ GitHub stars, ~5M monthly downloads (largest community)
              - listitem [ref=e368]: Automatic task dependency resolution and execution ordering
              - listitem [ref=e369]: ~2 billion agent executions across the prior 12 months
            - heading "Weaknesses" [level=3] [ref=e370]
            - list [ref=e371]:
              - listitem [ref=e372]: Role-playing abstraction adds performance overhead (extra LLM calls for "staying in character")
              - listitem [ref=e373]: Less control over execution flow than graph-based alternatives
              - listitem [ref=e374]: Debugging multi-agent interactions is opaque (hard to trace why Agent A delegated to Agent B)
              - listitem [ref=e375]: Python only
            - paragraph [ref=e376]:
              - strong [ref=e377]: "When to use:"
              - text: Rapid prototyping of multi-agent workflows where the team metaphor maps naturally to your problem. Content generation pipelines, research teams, QA workflows. Avoid for latency-sensitive systems where the role-playing overhead matters.
          - generic [ref=e378]:
            - heading "6. Smolagents (Hugging Face)" [level=2] [ref=e379]
            - paragraph [ref=e380]:
              - text: Smolagents is the minimalist entry. The entire agent logic fits in roughly 1,000 lines of code (
              - code [ref=e381]: agents.py
              - text: "). The key insight: instead of generating JSON tool calls, CodeAgent writes Python code snippets that invoke tools directly. This approach reduces LLM calls by about 30% compared to standard tool-calling methods on complex benchmarks."
            - paragraph [ref=e382]: "At 26,000+ GitHub stars with active commits through March 2026, Smolagents has grown fast. It is model-agnostic: local Transformers models, Ollama, OpenAI, Anthropic, and others via LiteLLM. For security, code execution runs in sandboxed environments through E2B, Modal, Docker, or Pyodide+Deno WebAssembly."
            - heading "Architecture" [level=3] [ref=e383]
            - paragraph [ref=e384]: "Two agent types: CodeAgent (generates Python tool invocations) and ToolCallingAgent (uses standard function calling). CodeAgent is the default and the reason to choose Smolagents. The agent generates a code snippet, the framework executes it in a sandbox, captures the output, and feeds it back. Multi-agent support through agent hierarchies where a manager agent delegates to specialized sub-agents."
