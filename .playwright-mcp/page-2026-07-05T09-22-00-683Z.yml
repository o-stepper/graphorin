          - generic [ref=e400]:
            - heading "7. Pydantic AI" [level=2] [ref=e401]
            - paragraph [ref=e402]: "Pydantic AI is not a multi-agent framework. It is a type-safe agent framework built by the Pydantic team, the same people whose validation library powers OpenAI, Anthropic, Google, and LangChain under the hood. The design philosophy mirrors FastAPI: type hints drive everything, and your IDE catches errors before runtime."
            - paragraph [ref=e403]: "Three structured output methods: Tool Output (tool calls produce typed results), Native Output (model generates JSON matching a schema), and Prompted Output (schema injected into instructions, plain text parsed). Streamed structured output with immediate validation means you get typed data as it generates, not after."
            - heading "Architecture" [level=3] [ref=e404]
            - paragraph [ref=e405]: Single-agent by design. You define an agent with a system prompt, result type (a Pydantic model), and tools. The framework handles schema generation, validation, retries on malformed output, and streaming. No orchestration layer, no multi-agent primitives. If you need multi-agent, compose Pydantic AI agents manually or use it inside another framework.
            - heading "Strengths" [level=3] [ref=e406]
            - list [ref=e407]:
              - listitem [ref=e408]: "Fully type-safe: IDE autocompletion and type checking catch errors at write-time"
              - listitem [ref=e409]: Three structured output methods (tool, native, prompted) with automatic fallbacks
              - listitem [ref=e410]: Streamed structured output with real-time validation
              - listitem [ref=e411]: "Model-agnostic: OpenAI, Anthropic, Gemini, Mistral, Ollama, Groq"
              - listitem [ref=e412]: 16k+ GitHub stars, built by the Pydantic team (trusted validation layer)
            - heading "Weaknesses" [level=3] [ref=e413]
            - list [ref=e414]:
              - listitem [ref=e415]: No multi-agent orchestration (single-agent only)
              - listitem [ref=e416]: No MCP or A2A protocol support
              - listitem [ref=e417]: Python only
              - listitem [ref=e418]: Not suited for complex workflows (no state persistence, no graph execution)
            - paragraph [ref=e419]:
              - strong [ref=e420]: "When to use:"
              - text: You need reliable structured output from LLMs and type safety is a priority. Data extraction pipelines, form processing, classification tasks, or any use case where "the model must return data matching this exact schema" is the core requirement. Pair with LangGraph or CrewAI if you also need orchestration.
          - generic [ref=e421]:
            - heading "8. AutoGen / Microsoft Agent Framework" [level=2] [ref=e422]
            - paragraph [ref=e423]: "AutoGen pioneered the multi-agent conversation pattern: agents talk to each other in group chats, debate solutions, and reach consensus. A 4-agent debate with 5 rounds is 20 LLM calls minimum. That cost is the trade-off for AutoGen's unique strength: human-in-the-loop conversations where an agent can pause, ask a human for input, and resume."
            - paragraph [ref=e424]: "The major 2026 development: Microsoft merged AutoGen and Semantic Kernel into the Microsoft Agent Framework. Release Candidate shipped February 19, 2026, and 1.0 GA shipped April 3, 2026 with stable APIs and a long-term-support commitment. AutoGen continues to receive bug fixes and security patches, but new features go into the unified framework. Greenfield projects should target Microsoft Agent Framework 1.0 directly."
            - heading "Architecture" [level=3] [ref=e425]
            - paragraph [ref=e426]: AutoGen v0.4 introduced an asynchronous, event-driven architecture with stronger observability. Agent Framework 1.0 keeps AutoGen's simple agent abstractions and adds Semantic Kernel's enterprise features (session-based state, type safety, middleware, telemetry, Azure AI integration), plus graph-based workflows and the orchestration patterns sequential, concurrent, handoff, group chat, and Magentic-One. It ships native MCP and A2A support across .NET and Python. Agents communicate through conversation turns with configurable termination conditions (max turns, keyword triggers, human approval).
            - heading "Strengths" [level=3] [ref=e427]
            - list [ref=e428]:
              - listitem [ref=e429]: "Best human-in-the-loop support: agents pause for human input mid-conversation"
              - listitem [ref=e430]: GroupChat pattern for multi-agent debate and consensus building
              - listitem [ref=e431]: Agent Framework 1.0 (GA April 3, 2026) merges AutoGen + Semantic Kernel
              - listitem [ref=e432]: Python and .NET support with native MCP and A2A (Azure ecosystem)
              - listitem [ref=e433]: Graph-based workflows plus sequential, concurrent, handoff, and Magentic-One patterns
            - heading "Weaknesses" [level=3] [ref=e434]
            - list [ref=e435]:
              - listitem [ref=e436]: "Token cost: every agent turn in GroupChat is a full LLM call with accumulated history"
              - listitem [ref=e437]: AutoGen is in maintenance mode (new features go to Microsoft Agent Framework 1.0)
              - listitem [ref=e438]: Existing AutoGen and Semantic Kernel projects still need a migration pass to 1.0
              - listitem [ref=e439]: Production deployment leans on the Azure ecosystem
            - paragraph [ref=e440]:
              - strong [ref=e441]: "When to use:"
              - text: Systems where agents need to deliberate, humans need to intervene mid-workflow, or you are already in the Microsoft/Azure ecosystem. Research applications where multi-agent debate produces better results than single-agent reasoning. Avoid for latency-sensitive pipelines where 20+ LLM calls per interaction is too expensive.
          - generic [ref=e442]:
            - 'heading "Protocol Layer: MCP, ACP, and A2A" [level=2] [ref=e443]'
            - paragraph [ref=e444]: Frameworks define how you build agents. Protocols define how agents connect to the outside world and to each other. Three protocols matter in 2026, and understanding the boundary between them prevents you from using the wrong tool for the wrong problem.
            - generic [ref=e445]:
              - generic [ref=e446]: Protocol vs Framework
              - generic [ref=e447]: Protocols are communication standards. Frameworks are development tools. MCP defines how to invoke tools. A2A defines how to invoke agents. Frameworks like CrewAI and Google ADK implement these protocols. The protocol choice constrains your interoperability. The framework choice constrains your development experience.
            - heading "MCP (Model Context Protocol)" [level=3] [ref=e448]
            - paragraph [ref=e449]: "Created by Anthropic. MCP standardizes how AI models access tools, APIs, and data sources. JSON-RPC client-server interface with typed data exchange. Think of it as \"USB for AI tools.\" Connect once, works everywhere that speaks MCP. Over 200 server implementations exist: GitHub, Slack, Google Drive, PostgreSQL, Notion, Jira, Salesforce, and more."
            - paragraph [ref=e450]:
              - text: MCP handles
              - strong [ref=e451]: vertical integration
              - text: ": application-to-model. It answers \"how does my agent call this tool?\" It does not answer \"how do two agents talk to each other.\" MCP is stateless at the protocol level, though individual servers can implement their own state."
            - heading "ACP (Agent Communication Protocol)" [level=3] [ref=e452]
            - paragraph [ref=e453]: Developed by IBM Research as part of the BeeAI platform. ACP introduced REST-native messaging, multimodal agent communication, and asynchronous streaming for agent-to-agent coordination. Agents could discover each other, delegate tasks, and exchange information in a shared local environment.
            - paragraph [ref=e454]: In late 2025, the ACP team joined Google's A2A protocol under the Linux Foundation. The merger preserved ACP's RESTful simplicity while incorporating A2A's enterprise features. New projects should target A2A directly. ACP's contribution lives on in A2A's REST-native endpoints and multimodal message format.
            - heading "A2A (Agent-to-Agent Protocol)" [level=3] [ref=e455]
            - paragraph [ref=e456]: "Google's protocol, now the unified standard for agent-to-agent communication under the Linux Foundation. A2A enables peer-to-peer task outsourcing through Agent Cards: JSON documents that describe an agent's identity, capabilities, skills, and authentication requirements. Any agent can discover any other agent by reading its Agent Card."
