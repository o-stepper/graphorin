          - paragraph [ref=e60]: Every major AI lab ships an agent framework now, and the 2026 releases landed fast. Microsoft Agent Framework 1.0 went GA on April 3, 2026, merging AutoGen and Semantic Kernel into one .NET and Python SDK. CrewAI passed 52,000 GitHub stars. Google shipped ADK 1.0 for Java and Go. Anthropic's Claude Agent SDK started drawing subscription usage from a separate monthly Agent SDK credit on June 15, 2026.
          - paragraph [ref=e61]: The protocol layer consolidated. ACP merged into A2A under the Linux Foundation. MCP crossed 200 server implementations. The question is no longer whether to use an agent framework but which one, and what you will regret in six months.
