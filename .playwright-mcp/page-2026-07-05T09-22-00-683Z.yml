            - heading "Multi-Agent Patterns That Actually Ship" [level=2] [ref=e496]
            - paragraph [ref=e497]: The 2026 multi-agent landscape organizes into four patterns. Each framework excels at one or two. None does all four well.
            - generic [ref=e498]:
              - generic [ref=e499]:
                - heading "Subagents (delegation)" [level=3] [ref=e500]:
                  - generic [ref=e501]: Subagents (delegation)
                - paragraph [ref=e502]: A supervisor agent delegates tasks to specialized child agents, each with their own tools and context. Claude Agent SDK and Google ADK use this pattern. Clean separation of concerns, but the supervisor becomes a bottleneck.
              - generic [ref=e503]:
