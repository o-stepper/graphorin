            - paragraph [ref=e274]: Developers need more than the best models to build useful agents—they need systems that support how agents inspect files, run commands, write code, and keep working across many steps.
            - paragraph [ref=e276]: The systems that exist today come with tradeoffs as teams move from prototypes to production. Model-agnostic frameworks are flexible but do not fully utilize frontier models capabilities ; model-provider SDKs can be closer to the model but often lack enough visibility into the harness; and managed agent APIs can simplify deployment but constrain where agents run and how they access sensitive data.
            - paragraph [ref=e278]: "Here’s what some of the customers who tested the new SDK with us had to say:"
            - generic [ref=e280]:
              - tablist "Tabs" [ref=e283]:
                - generic [ref=e286]:
                  - tab "Oscar Health" [selected] [ref=e287] [cursor=pointer]:
                    - generic [ref=e288]: Oscar Health
                  - tab "Actively" [ref=e289] [cursor=pointer]:
                    - generic [ref=e290]: Actively
                  - tab "LexisNexis" [ref=e291] [cursor=pointer]:
                    - generic [ref=e292]: LexisNexis
                  - tab "FurtherAI" [ref=e293] [cursor=pointer]:
                    - generic [ref=e294]: FurtherAI
                  - tab "Thomson Reuters" [ref=e295] [cursor=pointer]:
                    - generic [ref=e296]: Thomson Reuters
                  - tab "Zoom" [ref=e297] [cursor=pointer]:
                    - generic [ref=e298]: Zoom
                  - tab "Tomoro AI" [ref=e299] [cursor=pointer]:
                    - generic [ref=e300]: Tomoro AI
              - tabpanel "Oscar Health" [ref=e302]:
                - generic [ref=e304]:
                  - blockquote [ref=e305]: “The updated Agents SDK made it production-viable for us to automate a critical clinical records workflow that previous approaches couldn’t handle reliably enough. For us, the difference was not just extracting the right metadata, but correctly understanding the boundaries of each encounter in long, complex records. As a result, we can more quickly understand what's happening for each patient in a given visit, helping members with their care needs and improving their experience with us.”
                  - generic [ref=e306]: — Rachael Burns, Staff Engineer & AI Tech Lead, Oscar Health
            - heading "A more capable harness for the agent loop" [level=2] [ref=e310]
            - paragraph [ref=e312]: With today’s release, the Agents SDK harness becomes more capable for agents that work with documents, files, and systems. It now has configurable memory, sandbox-aware orchestration, Codex-like filesystem tools, and standardized integrations with primitives that are becoming common in frontier agent systems.
            - paragraph [ref=e314]:
              - text: These primitives include tool use via
              - link "MCP⁠ (opens in a new window)" [ref=e315] [cursor=pointer]:
                - /url: https://modelcontextprotocol.io
                - generic [ref=e316]: MCP
                - text: ⁠
                - generic [ref=e317]: (opens in a new window)
              - text: ", progressive disclosure via"
              - link "skills⁠ (opens in a new window)" [ref=e318] [cursor=pointer]:
                - /url: https://agentskills.io
                - generic [ref=e319]: skills
                - text: ⁠
                - generic [ref=e320]: (opens in a new window)
              - text: ", custom instructions via"
              - link "AGENTS.md⁠ (opens in a new window)" [ref=e321] [cursor=pointer]:
                - /url: https://agents.md
                - generic [ref=e322]: AGENTS.md
                - text: ⁠
                - generic [ref=e323]: (opens in a new window)
              - text: ", code execution using the"
              - link "shell⁠ (opens in a new window)" [ref=e324] [cursor=pointer]:
                - /url: https://developers.openai.com/api/docs/guides/tools-shell
                - generic [ref=e325]: shell
                - text: ⁠
                - generic [ref=e326]: (opens in a new window)
              - text: tool, file edits using the
              - link "apply patch⁠ (opens in a new window)" [ref=e327] [cursor=pointer]:
                - /url: https://developers.openai.com/api/docs/guides/tools-apply-patch
                - generic [ref=e328]: apply patch
                - text: ⁠
                - generic [ref=e329]: (opens in a new window)
              - text: tool, and more. The harness will continue to incorporate new agentic patterns and primitives over time, so developers can spend less time on core infrastructure updates and more time on the domain-specific logic that makes their agents useful.
            - generic [ref=e333]:
              - img "Diagram showing how the Agent SDK connects user input, models, and tools to build AI agents." [ref=e342]
              - img "Diagram showing how to build AI agents using the Agent SDK with models, tools, and orchestration." [ref=e351]
            - paragraph [ref=e353]: The harness also helps developers unlock more of a frontier model’s capability by aligning execution with the way those models perform best. That keeps agents closer to the model’s natural operating pattern, improving reliability and performance on complex tasks—particularly when work is long-running or coordinated across a diverse set of tools and systems.
            - paragraph [ref=e355]: In addition, we realize each product is unique and rarely fits neatly into a mold. We designed Agents SDK to support this diversity. Developers get a harness that’s turnkey yet flexible—making it easy to adapt it to their own stack—including tool use, memory, and sandbox environment.
            - heading "Native sandbox execution" [level=2] [ref=e359]
            - paragraph [ref=e361]: The updated Agents SDK supports sandbox execution natively, so agents can run in controlled computer environments with the files, tools, and dependencies they need for a task.
            - paragraph [ref=e363]: Many useful agents need a workspace where they can read and write files, install dependencies, run code, and use tools safely. Native sandbox support gives developers that execution layer out of the box, instead of forcing them to piece it together themselves.
            - paragraph [ref=e365]: Developers can bring their own sandbox or use built-in support for Blaxel, Cloudflare, Daytona, E2B, Modal, Runloop, and Vercel.
            - paragraph [ref=e367]: To make those environments portable across providers, the SDK also introduces a Manifest abstraction for describing the agent’s workspace. Developers can mount local files, define output directories, and bring in data from storage providers including AWS S3, Google Cloud Storage, Azure Blob Storage, and Cloudflare R2.
            - paragraph [ref=e369]: "This gives developers a consistent way to shape the agent’s environment from local prototype to production deployment. It also gives the model a predictable workspace: where to find inputs, where to write outputs, and how to keep work organized across a long-running task."
            - img "Logos for Daytona, E2B, Modal, Cloudflare, Vercel, Blaxel, Runloop" [ref=e379]
            - heading "Separating harness from compute for security, durability, and scale" [level=2] [ref=e383]
            - paragraph [ref=e385]: Agent systems should be designed assuming prompt-injection and exfiltration attempts. Separating harness and compute helps keep credentials out of environments where model-generated code executes.
            - paragraph [ref=e387]: It also enables durable execution. When the agent’s state is externalized, losing a sandbox container does not mean losing the run. With built-in snapshotting and rehydration, the Agents SDK can restore the agent’s state in a fresh container and continue from the last checkpoint if the original environment fails or expires.
            - paragraph [ref=e389]: Finally, it makes agents more scalable. Agent runs can use one sandbox or many, invoke sandboxes only when needed, route subagents to isolated environments, and parallelize work across containers for faster execution.
            - generic [ref=e393]:
              - img "Flow diagram illustrating how the Agent SDK enables AI agents to use additional compute resources for more complex tasks." [ref=e402]
              - img "Diagram depicting how AI agents built with the Agent SDK can orchestrate separate compute systems, allowing workloads to run independently while supporting more advanced tasks." [ref=e411]
            - heading "Pricing and availability" [level=2] [ref=e415]
            - paragraph [ref=e417]: These new Agents SDK capabilities are generally available to all customers via the API and use standard API pricing, based on tokens and tool use.
            - heading "What’s next" [level=2] [ref=e421]
            - paragraph [ref=e423]: As we continue to develop the Agents SDK, we’ll keep expanding what developers can build with it, making it easier to bring more capable agents into production with less custom infrastructure, while preserving the flexibility and control developers need to fit agents into their own environments.
            - paragraph [ref=e425]: The new harness and sandbox capabilities are launching first in Python, with TypeScript support planned for a future release. We’re also working to bring additional agent capabilities, including code mode and subagents, to both Python and TypeScript.
            - paragraph [ref=e427]: In addition, we want to help bring the broader agent ecosystem together over time, with support for more sandbox providers, more integrations, and more ways for developers to plug the SDK into the tools and systems they already use.
