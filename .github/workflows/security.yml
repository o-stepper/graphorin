name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit + license allowlist
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (production, high+)
        run: pnpm audit --prod --audit-level=high

      - name: License allowlist
        run: pnpm run check-licenses

      # W-077: pnpm has no `audit signatures` subcommand - the old step
      # silently ran a second vulnerability audit and swallowed failures
      # with ::warning. The script installs the workspace's external
      # dependency union into a scratch project and runs the real
      # `npm audit signatures` (Sigstore/registry verification), failing
      # hard on any unverified signature AND on a vacuous zero-verified
      # pass. A red weekly run escalates via notify-on-failure below.
      - name: Verify dependency signatures + attestations (npm audit signatures)
        run: node scripts/check-dep-signatures.mjs

  codeql:
    name: CodeQL · javascript-typescript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4

  # E3: the weekly cron is the only run that catches a CVE disclosed between
  # PRs - a silent red run defeats its purpose.
  notify-on-failure:
    needs: [audit, codeql]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yml
