name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit + license allowlist
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 2026-07-16: npm retired the classic audit endpoint
      # (/-/npm/v1/security/audits now answers HTTP 410), and every pnpm
      # release to date (incl. 11.13.1) still calls it - `pnpm audit` fails
      # on infrastructure, not on findings. Scan the lockfile against
      # OSV.dev (which mirrors the GitHub/npm advisory DB) instead. The
      # binary is pinned by version AND sha256; osv-scanner exits non-zero
      # on any actionable finding (no severity knob - suppressions go in a
      # reviewed osv-scanner.toml if ever needed). Revisit pnpm audit once
      # it speaks the bulk advisory endpoint.
      - name: Vulnerability audit (osv-scanner over pnpm-lock.yaml)
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          echo "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0  /tmp/osv-scanner" | sha256sum -c -
          chmod +x /tmp/osv-scanner
          /tmp/osv-scanner scan source --lockfile pnpm-lock.yaml

      - name: License allowlist
        run: pnpm run check-licenses

      # W-077: pnpm has no `audit signatures` subcommand - the old step
      # silently ran a second vulnerability audit and swallowed failures
      # with ::warning. The script installs the workspace's external
      # dependency union into a scratch project and runs the real
      # `npm audit signatures` (Sigstore/registry verification), failing
      # hard on any unverified signature AND on a vacuous zero-verified
      # pass. A red weekly run escalates via notify-on-failure below.
      - name: Verify dependency signatures + attestations (npm audit signatures)
        run: node scripts/check-dep-signatures.mjs

  # deep-retest-0.13.11: general-purpose secret scan over the checkout,
  # complementing the redaction-corpus tests. Binary pinned by version
  # AND sha256 (osv-scanner precedent above). `.gitleaks.toml` allowlists
  # only synthetic-fixture trees (tests, tmp/ audit deliverables) -
  # runtime source is fully scanned, and the job BLOCKS on findings.
  secret-scan:
    name: Secret scan (gitleaks over the working tree)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan for secrets (gitleaks, pinned)
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz
          echo "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks dir . --no-banner --config .gitleaks.toml

  codeql:
    name: CodeQL · javascript-typescript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4

  # E3: the weekly cron is the only run that catches a CVE disclosed between
  # PRs - a silent red run defeats its purpose.
  notify-on-failure:
    needs: [audit, codeql, secret-scan]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yml
