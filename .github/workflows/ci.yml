name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint-typecheck-test-build:
    name: ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']
        # W-076: engines says >=22 (engine-strict), so the current LTS a
        # new user installs must actually be exercised - native-addon ABI
        # (better-sqlite3, sqlite-vec) and worker-thread semantics are the
        # realistic break points. One ubuntu leg is enough for that ABI
        # signal; it gets its own warm turbo cache (node version is in the
        # cache key).
        include:
          - os: ubuntu-latest
            node: '24'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # W-075: persist the turbo cache (.turbo/cache) across runs. The
      # primary key is unique per run ON PURPOSE: actions/cache skips the
      # save when the primary key hits, so a static lockfile-keyed cache
      # would be written once and go stale as src evolves; a unique key
      # re-saves every run and restore-keys pulls the nearest warm cache
      # by prefix. Staleness cannot mask a broken build - turbo hashes
      # the task inputs (src/**, tsconfig, package.json), and fork-PR
      # poisoning is excluded by actions/cache branch scoping. GitHub
      # evicts by LRU inside the 10GB repo budget.
      - name: Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-node${{ matrix.node }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      # Use the turbo-aware aliases (`pnpm typecheck` / `pnpm test` /
      # `pnpm build`) rather than `pnpm -r ...`. Turbo honours the
      # `dependsOn: ["^build"]` rule in turbo.json, so producers like
      # `@graphorin/core` get built before downstream packages
      # typecheck against their published `dist/*.d.ts`. `pnpm -r`
      # parallelises by topological order but never produces those
      # build artifacts, which is why typecheck used to fail with
      # `TS2307: Cannot find module '@graphorin/core'`.
      - name: Typecheck
        run: pnpm typecheck

      # Timeouts here are HANG detectors, not performance gates - they
      # only bite when a test genuinely stalls, so generous CI bounds
      # cost nothing on the happy path. History of the wall-clock flake
      # class on shared runners (sqlite store open + 38 migrations,
      # Argon2id KDF, server app wiring under CPU starvation - slow I/O,
      # never a hang): 30s test override added after five 5s blows; the
      # 0.11.0 scheduler flake needed hook bounds too (vitest bounds
      # hooks SEPARATELY, and a CLI --testTimeout never touches them -
      # the 10s hook default was live in CI this whole time); third
      # occurrence 2026-07-19 blew BOTH windows on the 0.13.0 release PR
      # (health-checks WAL-clamp: 30s test + 10s hook). 120s/120s
      # retires the class instead of per-file whack-a-mole. NOTE: vitest
      # CLI options OVERRIDE per-package vitest.config values, so these
      # flags are the single source of truth in CI; local runs keep the
      # strict 5s/10s defaults.
      # Invoked through `turbo run ... --` directly and pinned to bash:
      # the windows runner's default pwsh strips the bare `--` separator
      # when spawning native commands, so turbo saw --testTimeout as its
      # own (unknown) option and printed usage. bash preserves it on
      # every runner OS.
      - name: Test
        shell: bash
        run: pnpm exec turbo run test -- --testTimeout=120000 --hookTimeout=120000

      - name: Build
        run: pnpm build

      # DOC-13: type-check the documentation's `ts` snippets against the just-built
      # `dist/*.d.ts` — a doc that names a non-existent export/option fails here.
      - name: Doc snippets type-check
        run: pnpm run check-doc-snippets

      # W-073: the doc/network gates are regex parsers over evolving inputs;
      # a silent parser regression would turn them permanently green. Prove
      # the parsers still bite before trusting their verdicts below.
      - name: Gate-script self-tests
        run: pnpm run check-gates-selftest

      # DOC-6: diff the CLI guide against the real commander tree — a documented
      # command/subcommand that does not exist (e.g. `consolidator run`) fails here.
      - name: CLI docs command diff
        run: pnpm run check-cli-docs

      # deep-retest 0.13.12 P2: a benchmark README shipped a runner path
      # whose package directory does not exist (MODULE_NOT_FOUND on first
      # contact). Benchmark READMEs now get the same documented-command
      # validation the CLI/example docs already have.
      - name: Benchmark README command gate
        run: pnpm run check-benchmark-readmes

      # Every version-bearing site (workspace manifests, badges, footers,
      # image tags, baselines) must agree with packages/core/package.json;
      # code derives its version from package.json, so a reintroduced
      # hardcoded version literal fails here too.
      - name: Version consistency
        run: pnpm run check-version-consistency

      # W-050: every declared @graphorin/* edge must be a real import and
      # every tsdown external entry must be a declared dependency/peer -
      # phantom manifest edges lie about the install graph.
      - name: Phantom dependency gate
        run: pnpm run check-phantom-deps

      # W-149: the 0.6.0 character-rules sweep (ASCII punctuation in all
      # markdown) regressed exactly where it had no gate; this keeps
      # tracked md + NOTICE free of em/en dashes and curly quotes.
      - name: Character rules gate
        run: pnpm run check-character-rules

      # deep-retest-0.13.9 P2: docs links on the landing domain
      # (graphorin.com/guide|api|reference) are guaranteed live 404s -
      # the site is docs.graphorin.com and the offline lychee gate
      # cannot see external URLs. Shipped twice before this gate.
      - name: Docs-domain link gate
        run: pnpm run check-doc-links

      # Deep retest 2026-07-19 P1-1: the `file://${process.argv[1]}`
      # entrypoint idiom silently no-ops in checkouts whose path contains
      # a space (12 runners + 2 doc gates shipped it). Static sweep here;
      # the dynamic spaced-directory proof runs in gates-selftest.
      - name: Entrypoint-guard gate
        run: pnpm run check-entry-guards

      # W-127: the @graphorin/core public surface is committed as an
      # api-extractor report; a PR that changes the surface without
      # updating packages/core/etc/core.api.md fails here, making every
      # API change an explicit, reviewable diff. Runs after Build (the
      # report extracts from dist).
      - name: Core API report gate
        run: pnpm run check-api-report

      # Runs on the ubuntu+node22 leg only by design (same rationale as
      # examples-smoke): the benchmarks measure framework logic the
      # OS/node matrix already covers; repeating them on macos/windows or
      # the node24 leg adds wall-time, not platform signal.
      - name: Benchmark smoke + cost regression + doc guards
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: pnpm run benchmark:ci

  # Runs on ubuntu only by design: the examples exercise the framework's
  # public API surface, which the 3-OS matrix above already covers; the
  # smoke adds API-regression signal, not platform signal.
  # Coverage-threshold enforcement (prod-readiness item 3): every package
  # declares vitest coverage thresholds, but a threshold only bites when
  # `--coverage` actually runs - without this job coverage could regress
  # green forever. One ubuntu leg is the signal; the OS matrix legs stay
  # instrumentation-free. GRAPHORIN_COVERAGE=1 skips the p95 latency
  # canaries (security), which measure nothing under V8 instrumentation.
  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      # Own cache stream: the --coverage args change every task hash, so
      # sharing the matrix legs' cache would only thrash their entries.
      - name: Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-coverage-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-coverage-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage thresholds
        shell: bash
        env:
          GRAPHORIN_COVERAGE: '1'
        # Same hang-detector bounds as the matrix Test step (see its
        # comment) - V8 instrumentation makes everything slower still.
        run: pnpm exec turbo run test -- --coverage --testTimeout=120000 --hookTimeout=120000

      # Spaced-path regression guard: vitest 3.x collapsed coverage to
      # nonsense when the checkout path contained a space (A/B on
      # identical code: 18.87% vs 79.74% lines, threshold false-fail;
      # 2026-07-19 deep retest). vitest 4 fixed it, and hosted runners
      # never have spaces in their paths, so without this step the
      # class would be invisible to CI forever. One package's coverage
      # from a spaced hardlink copy is enough to pin the behaviour.
      - name: Coverage from a spaced checkout path
        shell: bash
        env:
          GRAPHORIN_COVERAGE: '1'
        run: |
          dest="$RUNNER_TEMP/graphorin cov space"
          cp -al "$GITHUB_WORKSPACE" "$dest"
          cd "$dest"
          pnpm --filter @graphorin/core exec vitest run --coverage --testTimeout=120000 --hookTimeout=120000

  examples-smoke:
    name: Examples smoke (stub recipe)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Examples consume the built `dist/*` of every `@graphorin/*`
      # package, so a public-API regression surfaces here. `smoke-examples`
      # runs each runnable example against the deterministic `stub`
      # recipe and asserts a clean exit (and the fail-fast path for
      # local-stack-cli).
      - name: Build framework packages
        run: pnpm build

      - name: Smoke-test examples
        run: pnpm run smoke-examples

  # W-071: the pack gate. Everything above validates the WORKSPACE,
  # where workspace:* symlinks and shared root devDependencies mask
  # defects of the published artifacts; this job validates the packed
  # tarballs (publint + attw + a one-shot npm-install scratch consumer
  # + a tsc matrix). Registry access is deliberate here (it IS npm
  # install), unlike the offline test suite. ubuntu-only by design:
  # artifact signal, not platform signal (same rationale as
  # examples-smoke). Every leg is enforced, including zod4 (its W-013
  # break was fixed in wave 2 - the shim path is PropertyKey-based and
  # no published d.ts carries concrete zod generics anymore).
  package-shape:
    name: Pack gate (publint + attw + scratch consumer)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Registry flakes are the main noise source here - retry once
      # before failing the job (mirrors the C4 post-publish smoke).
      - name: Pack gate
        run: |
          node scripts/check-package-shape.mjs \
            || node scripts/check-package-shape.mjs --skip-build

