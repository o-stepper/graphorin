name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint-typecheck-test-build:
    name: ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      # Use the turbo-aware aliases (`pnpm typecheck` / `pnpm test` /
      # `pnpm build`) rather than `pnpm -r ...`. Turbo honours the
      # `dependsOn: ["^build"]` rule in turbo.json, so producers like
      # `@graphorin/core` get built before downstream packages
      # typecheck against their published `dist/*.d.ts`. `pnpm -r`
      # parallelises by topological order but never produces those
      # build artifacts, which is why typecheck used to fail with
      # `TS2307: Cannot find module '@graphorin/core'`.
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Benchmark smoke + cost regression + doc guards
        run: pnpm run benchmark:ci

