name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing authenticates via **npm trusted publishing (OIDC)** - W-139
# replaced the long-lived NPM_TOKEN of decision C1. `changeset publish`
# shells out to `npm publish` per package; with npm >= 11.5.1 and a
# trusted publisher configured registry-side, npm exchanges this
# workflow's OIDC token (the `id-token: write` permission on the
# publish job) for a short-lived publish credential. Sigstore
# provenance continues to ride the same OIDC identity
# (`.npmrc provenance=true` + per-package `publishConfig.provenance`).
#
# Registry-side checklist (manual, one-time per package - all 27
# `@graphorin/*` packages need it BEFORE the first OIDC release):
#   npmjs.com -> package -> Settings -> Trusted publisher ->
#     GitHub Actions / repository `o-stepper/graphorin` /
#     workflow `release.yml` (no environment).
# Rollback (first OIDC release only): the `NPM_TOKEN` secret stays in
# repo settings until one OIDC release passes the C4 provenance smoke;
# if the publish job goes red, re-add
#   `NPM_TOKEN: ${{ secrets.NPM_TOKEN }}`
# to the changesets/action env below (one line) and re-run. Both
# mechanisms must NEVER be active together: while the env is present,
# changesets/action writes a token-based .npmrc and npm publishes by
# token - the OIDC path would not be exercised at all. After the first
# verified OIDC release: delete the NPM_TOKEN secret and this rollback
# note's escape hatch.
#
# The publish step is gated on the `RELEASE_ENABLED` **repository
# variable** so an accidental main-branch push never publishes before
# the registry side is configured. A `workflow_dispatch` rehearsal with
# RELEASE_ENABLED != 'true' exercises the environment (permissions, npm
# version) but NOT the OIDC token exchange - only a real publish
# verifies that, which is why the rollback above stays one line.
#
# W-139 part 2: the dependency-laden build+test (mvp-readiness) runs in
# its own `readiness` job with `contents: read` and NO persisted git
# credentials - a compromised dev dependency there can no longer push
# to the repository. Only the `publish` job holds write permissions.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  readiness:
    name: MVP readiness (no write credentials)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # CI-15: a `workflow_dispatch` can be triggered from any branch that carries
    # this file. Gate the job on `main` so a dispatch from a feature branch is
    # skipped (it would otherwise version/publish branch content). Mirrors the
    # `docs.yml` deploy gate.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The full build+test of every workspace package runs here with
          # ZERO write credentials in git config (W-139).
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: MVP readiness gate
        run: pnpm run mvp-readiness

  release:
    name: Version & publish via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: readiness
    if: github.ref == 'refs/heads/main'
    permissions:
      # changesets/action pushes the Version Packages branch + tags and
      # opens the release PR; OIDC publish + provenance need id-token.
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # changesets/action pushes the "Version Packages" branch + tags, so it
          # needs the checkout to retain the GITHUB_TOKEN git credentials (CI-6).
          # Unlike the readiness job, this job runs only the version/publish
          # machinery - no workspace test code executes here.
          persist-credentials: true

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          # No `registry-url:`; with OIDC trusted publishing npm needs no
          # auth token in .npmrc at all, and a setup-node registry-url would
          # write an empty-token .npmrc that breaks the exchange.

      - name: Upgrade npm for OIDC trusted publishing
        # Node 22 bundles npm 10.x; the OIDC token exchange requires
        # npm >= 11.5.1. `changeset publish` shells to `npm publish`, so
        # the global npm version is what authenticates.
        run: |
          npm install -g npm@11
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dry-run publish (releases not enabled yet)
        if: ${{ vars.RELEASE_ENABLED != 'true' }}
        run: |
          echo "::warning title=Release skipped::Repository variable RELEASE_ENABLED is not 'true'; running in dry-run mode (configure the npm trusted publishers first - see the checklist at the top of this workflow)."
          pnpm -r publish --dry-run --no-git-checks

      - name: Create Release PR or Publish
        id: changesets
        if: ${{ vars.RELEASE_ENABLED == 'true' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run release
          # NOTE: a root script literally named `version` collides with the
          # npm lifecycle hook of `npm version` - it is only ever invoked
          # explicitly (here and by maintainers as `pnpm run version`), never
          # through `npm version`. The script chains `changeset version` with
          # `bump-version --sync`, which is idempotent and ends by running
          # check-version-consistency (proxying its exit code), so a bot PR
          # passes the gate without manual sync steps (W-015).
          version: pnpm run version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          # W-015: with a fine-grained RELEASE_PAT (contents + pull-requests,
          # this repository only) the action can OPEN the Version Packages PR
          # even though repo settings forbid the default GITHUB_TOKEN from
          # creating PRs; without the secret the expression falls back to
          # GITHUB_TOKEN and the documented manual flow stays in force.
          # (Alternative: enable "Allow GitHub Actions to create and approve
          # pull requests" in repo settings and keep GITHUB_TOKEN.)
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          # 0.9.0 ONLY (remove right after): token-based publish for ONE
          # release, because @graphorin/channels and @graphorin/proactive
          # publish for the FIRST time this train and npm cannot configure a
          # trusted publisher on a package that does not exist yet
          # (npm/cli#8544). With this env present changesets/action writes a
          # token-based .npmrc and every package publishes by token; Sigstore
          # provenance still rides `id-token: write` +
          # NPM_CONFIG_PROVENANCE, exactly as in the pre-W-139 releases.
          # After the release: configure trusted publishers for the two new
          # packages, delete the NPM_TOKEN secret AND this line (an empty
          # secret would write an empty-token .npmrc that breaks the OIDC
          # exchange).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # C4 / Wave-4 acceptance gate: after a real publish, verify the release
      # actually carries valid Sigstore provenance + npm registry signatures.
      # Runs in a throwaway project (NOT the workspace, where `@graphorin/*` are
      # symlinked and would bypass registry verification) against the base leaf
      # package `@graphorin/core` (zero internal deps), so it installs
      # cleanly even when a release is partial/interrupted, and lockstep
      # versioning means it is always part of the published set. `npm audit
      # signatures` exits non-zero if any signature or attestation fails to
      # verify, so a bad provenance chain fails the run. No publish credential
      # here: signature verification is a public-registry read.
      - name: Post-publish provenance smoke (C4)
        if: ${{ vars.RELEASE_ENABLED == 'true' && steps.changesets.outputs.published == 'true' }}
        run: |
          version="$(node -p "require('./packages/core/package.json').version")"
          echo "Verifying provenance + registry signatures for @graphorin/core@${version}"
          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null 2>&1
          # Absorb brief registry propagation lag right after publish. E2: the
          # gate must fail EXPLICITLY when the install never succeeds - running
          # `npm audit signatures` against an empty project can exit 0
          # ("audited 0 packages"), turning the one gate whose job is to catch
          # a bad release into a false green.
          installed=false
          for attempt in 1 2 3; do
            if npm install "@graphorin/core@${version}" --no-audit --no-fund; then
              installed=true
              break
            fi
            echo "::warning::install attempt ${attempt} failed (registry propagation?); retrying in 15s"
            sleep 15
          done
          if [ "$installed" != "true" ]; then
            echo "::error::@graphorin/core@${version} never installed from the registry; provenance cannot be verified"
            exit 1
          fi
          npm audit signatures
