name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing authenticates with a long-lived **NPM_TOKEN** (decision C1): an npm
# automation / granular-access token with publish rights to the `@graphorin`
# scope, injected as `NPM_TOKEN` on the publish step only (CI-10) so the
# workspace build/test steps never see it. Sigstore provenance is still attached
# via OIDC (`id-token: write` below + `.npmrc` provenance=true + per-package
# `publishConfig.provenance`); provenance uses OIDC regardless of the publish
# auth method.
#
# The publish step is gated on the `RELEASE_ENABLED` **repository variable** so
# an accidental main-branch push never publishes before the registry side is
# configured. Maintainer provisioning order:
#
#   1. Create an npm automation token with publish rights to the `@graphorin`
#      scope (there is no unscoped `graphorin` package - the root manifest of
#      that name is private) and add it as the repo secret `NPM_TOKEN`.
#   2. Rehearse with a `workflow_dispatch` run (the dry-run step below fires
#      whenever RELEASE_ENABLED is not yet 'true') to confirm auth + the set.
#   3. Set the repository variable `RELEASE_ENABLED=true`. From then on
#      `changesets/action` publishes via NPM_TOKEN on a push to main.
permissions:
  contents: write
  pull-requests: write
  id-token: write # Sigstore provenance attestation (works alongside NPM_TOKEN auth).

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & publish via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # CI-15: a `workflow_dispatch` can be triggered from any branch that carries
    # this file. Gate the job on `main` so a dispatch from a feature branch is
    # skipped (it would otherwise version/publish branch content). Mirrors the
    # `docs.yml` deploy gate.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # changesets/action pushes the "Version Packages" branch + tags, so it
          # needs the checkout to retain the GITHUB_TOKEN git credentials (CI-6).
          persist-credentials: true

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          # No `registry-url:`; `changesets/action` writes its own publish
          # `.npmrc` from the `NPM_TOKEN` env below; a setup-node registry-url
          # would add a second, empty-token `.npmrc` that shadows it.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: MVP readiness gate
        run: pnpm run mvp-readiness

      - name: Dry-run publish (releases not enabled yet)
        if: ${{ vars.RELEASE_ENABLED != 'true' }}
        run: |
          echo "::warning title=Release skipped::Repository variable RELEASE_ENABLED is not 'true'; running in dry-run mode (configure NPM_TOKEN + the @graphorin scope first)."
          pnpm -r publish --dry-run --no-git-checks

      - name: Create Release PR or Publish
        id: changesets
        if: ${{ vars.RELEASE_ENABLED == 'true' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run release
          # NOTE: a root script literally named `version` collides with the
          # npm lifecycle hook of `npm version` - it is only ever invoked
          # explicitly (here and by maintainers as `pnpm run version`), never
          # through `npm version`. The script chains `changeset version` with
          # `bump-version --sync`, which is idempotent and ends by running
          # check-version-consistency (proxying its exit code), so a bot PR
          # passes the gate without manual sync steps (W-015).
          version: pnpm run version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          # W-015: with a fine-grained RELEASE_PAT (contents + pull-requests,
          # this repository only) the action can OPEN the Version Packages PR
          # even though repo settings forbid the default GITHUB_TOKEN from
          # creating PRs; without the secret the expression falls back to
          # GITHUB_TOKEN and the documented manual flow stays in force.
          # (Alternative: enable "Allow GitHub Actions to create and approve
          # pull requests" in repo settings and keep GITHUB_TOKEN.)
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          # `changesets/action` reads the env var named exactly `NPM_TOKEN` to
          # write its publish `.npmrc`; scoped to THIS step only (CI-10) so the
          # workspace build/test steps never see it. (Passing it as
          # NODE_AUTH_TOKEN makes the action miss it and fall back to OIDC.)
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # C4 / Wave-4 acceptance gate: after a real publish, verify the release
      # actually carries valid Sigstore provenance + npm registry signatures.
      # Runs in a throwaway project (NOT the workspace, where `@graphorin/*` are
      # symlinked and would bypass registry verification) against the base leaf
      # package `@graphorin/core` (zero internal deps), so it installs
      # cleanly even when a release is partial/interrupted, and lockstep
      # versioning means it is always part of the published set. `npm audit
      # signatures` exits non-zero if any signature or attestation fails to
      # verify, so a bad provenance chain fails the run. No NPM_TOKEN here:
      # signature verification is a public-registry read, so the publish token
      # stays scoped to the step above (CI-10).
      - name: Post-publish provenance smoke (C4)
        if: ${{ vars.RELEASE_ENABLED == 'true' && steps.changesets.outputs.published == 'true' }}
        run: |
          version="$(node -p "require('./packages/core/package.json').version")"
          echo "Verifying provenance + registry signatures for @graphorin/core@${version}"
          workdir="$(mktemp -d)"
          cd "$workdir"
          npm init -y >/dev/null 2>&1
          # Absorb brief registry propagation lag right after publish. E2: the
          # gate must fail EXPLICITLY when the install never succeeds - running
          # `npm audit signatures` against an empty project can exit 0
          # ("audited 0 packages"), turning the one gate whose job is to catch
          # a bad release into a false green.
          installed=false
          for attempt in 1 2 3; do
            if npm install "@graphorin/core@${version}" --no-audit --no-fund; then
              installed=true
              break
            fi
            echo "::warning::install attempt ${attempt} failed (registry propagation?); retrying in 15s"
            sleep 15
          done
          if [ "$installed" != "true" ]; then
            echo "::error::@graphorin/core@${version} never installed from the registry; provenance cannot be verified"
            exit 1
          fi
          npm audit signatures
