name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# The release job is gated on the `NPM_TOKEN` repository secret. Until
# that secret is provisioned the job is a no-op and emits a warning so
# accidental main-branch pushes never publish. Provisioning order:
#
#   1. Add the npm token (with `automation` scope) as `NPM_TOKEN`.
#   2. Add a Sigstore-aware OIDC trust policy on the npm side
#      (`registry.npmjs.org`).
#   3. Run the workflow once via `workflow_dispatch`; from then on
#      `changesets/action` opens the "Version Packages" PR
#      automatically and publishes when that PR merges.
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & publish via Changesets
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: MVP readiness gate
        run: pnpm run mvp-readiness

      - name: Skip publish — NPM_TOKEN not provisioned yet
        if: ${{ env.NPM_TOKEN == '' }}
        run: |
          echo "::warning title=Release skipped::Repository secret NPM_TOKEN is not set; running in dry-run mode."
          pnpm -r publish --dry-run --access public --no-git-checks

      - name: Create Release PR or Publish
        if: ${{ env.NPM_TOKEN != '' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run release
          version: pnpm run version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
