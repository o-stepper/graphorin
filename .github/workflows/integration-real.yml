name: Real integration

# Deep-retest 0.13.5 P3: the unit suites exercise the Docker sandbox and the
# Ollama adapter through fakes (stub peer loaders, injected fetch), so a
# regression in the REAL service paths - live daemon semantics, actual model
# behaviour - would only surface for users. This matrix runs the real legs on
# a weekly schedule and on demand; it is never PR-blocking.
#
# Intentionally NOT covered here (the documented gaps):
#   - llama.cpp real runtime: needs a native node-llama-cpp build plus GGUF
#     weights on the runner; candidate third job if the provider grows.
#   - OS keyring: needs a headless secret-service (gnome-keyring + dbus
#     choreography), which is flake-prone on hosted runners.
#   - AUTHENTICATED 1Password reads: need a paid service-account secret in
#     the repo - a maintainer decision, not a workflow default. The
#     UNAUTHENTICATED CLI contract (argv parses against the real binary) IS
#     covered below: 0.13.7 shipped `op read --reveal`, a flag the real CLI
#     rejects, because only injected-spawn fakes ever saw the wrapper
#     (deep-retest 0.13.7 P1).

on:
  workflow_dispatch:
  schedule:
    # Tuesdays 06:30 UTC - staggered off the Monday docker-smoke /
    # consumer-smoke / security crons.
    - cron: '30 6 * * 2'

concurrency:
  group: integration-real-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  docker-sandbox:
    name: Docker sandbox (live daemon)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @graphorin/security (turbo builds its dependencies)
        run: pnpm exec turbo run build --filter=@graphorin/security

      - name: Pull the sandbox image
        run: docker pull node:22-alpine

      # GRAPHORIN_DOCKER_TEST=1 arms the `with a live Docker daemon` block in
      # tests/sandbox/docker.test.ts: a one-shot container runs real source
      # through the real dockerode peer (already installed - it is an
      # auto-installed optional peer of @graphorin/security).
      - name: Run the Docker sandbox suite against the live daemon
        run: |
          set -euo pipefail
          GRAPHORIN_DOCKER_TEST=1 pnpm --filter @graphorin/security exec \
            vitest run tests/sandbox/docker.test.ts \
            --reporter=default --reporter=json --outputFile=docker-vitest.json

      # Guard against a silent no-op: the live-daemon test must have RUN and
      # passed, not been collected as skipped (which is what happens when the
      # opt-in env var gets lost).
      - name: Assert the live-daemon leg actually ran
        run: |
          set -euo pipefail
          jq -e '
            [.testResults[].assertionResults[]
             | select(.title | contains("one-shot container"))
             | select(.status == "passed")]
            | length == 1
          ' packages/security/docker-vitest.json

  ollama-doctor:
    name: Ollama end-to-end (doctor --strict-smoke-local)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @graphorin/cli (turbo builds its dependencies)
        run: pnpm exec turbo run build --filter=@graphorin/cli

      - name: Install and start Ollama (pinned artifact, checksum-verified)
        env:
          # deep-retest-0.13.10 P2 / issue #239: an unpinned `latest`
          # install segfaulted (llama-server) during model warm-up,
          # before any Graphorin assertion ran. Pin a known-good
          # release; bump deliberately, with a green scheduled run.
          # deep-retest-0.13.12 P2: the previous `curl | sh` executed a
          # MUTABLE remote installer before anything was verified.
          # Download the versioned release artifact and check its sha256
          # against the value recorded from the official release
          # (sha256sum.txt and the GitHub asset digest agree) - the
          # gitleaks/syft/osv-scanner pinning pattern. Bumping
          # OLLAMA_VERSION requires refreshing OLLAMA_SHA256 from that
          # release's sha256sum.txt.
          OLLAMA_VERSION: 0.32.0
          OLLAMA_SHA256: 56362d7609dfa9e35aaebb7c9cab25605d8f0528ec3d5d585dc83d6642002bab
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/ollama.tar.zst \
            "https://github.com/ollama/ollama/releases/download/v${OLLAMA_VERSION}/ollama-linux-amd64.tar.zst"
          echo "${OLLAMA_SHA256}  /tmp/ollama.tar.zst" | sha256sum -c -
          mkdir -p "${HOME}/ollama-dist"
          tar --zstd -xf /tmp/ollama.tar.zst -C "${HOME}/ollama-dist"
          rm /tmp/ollama.tar.zst
          echo "${HOME}/ollama-dist/bin" >> "${GITHUB_PATH}"
          export PATH="${HOME}/ollama-dist/bin:${PATH}"
          ollama --version
          # No installer means no systemd unit - always run the foreground
          # daemon in the background.
          (nohup ollama serve >/tmp/ollama-serve.log 2>&1 &)
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:11434/api/version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo 'Ollama daemon did not become reachable' >&2
          cat /tmp/ollama-serve.log 2>/dev/null || true
          exit 1

      - name: Pull the models
        run: |
          set -euo pipefail
          ollama pull qwen3:0.6b
          ollama pull nomic-embed-text

      - name: Warm the chat model (one retry)
        run: |
          set -euo pipefail
          # Load the chat model into memory so the doctor chat leg measures a
          # warm round-trip instead of racing its cold-load against the
          # 60-second budget. The warm-up is the step that crashed under the
          # unpinned runtime (issue #239) - retry it ONCE so a transient
          # loader hiccup does not kill the whole integration signal, while a
          # reproducible crash still fails loudly.
          warm() { ollama run qwen3:0.6b "Reply with the single word OK."; }
          if ! warm; then
            echo 'warm-up failed once; retrying after 5s' >&2
            sleep 5
            warm
          fi

      - name: Run doctor --strict-smoke-local against the live daemon
        run: |
          set -euo pipefail
          # --strict-smoke-local (deep-retest-0.13.10 P2) exits non-zero
          # unless EVERY smoke leg is ok - this run live-proves the flag on
          # each schedule; the jq assertion below stays as the second belt.
          node packages/cli/dist/bin/graphorin.js doctor --strict-smoke-local \
            --ollama-model qwen3:0.6b --json | tee doctor-report.json

      # A missing daemon degrades to warn+skip by design (doctor still exits
      # 0), so assert the real legs RAN: all six smoke checks present, and
      # every Ollama-dependent leg is ok - not skip, not warn.
      - name: Assert every smoke leg ran for real
        run: |
          set -euo pipefail
          jq -e '
            ([.checks[] | select(.check | startswith("smoke:"))] | length) == 6
            and ([.checks[]
                  | select(.check == "smoke:native" or .check == "smoke:sqlite-roundtrip"
                           or .check == "smoke:ollama" or .check == "smoke:ollama-models"
                           or .check == "smoke:embedding" or .check == "smoke:chat")
                  | select(.status != "ok")]
                 | length) == 0
          ' doctor-report.json

      # deep-retest-0.13.10 P2: when the job dies before any Graphorin
      # assertion (daemon crash, model-load segfault), the diagnosis
      # must not depend on rerunning - always ship the daemon logs.
      - name: Collect Ollama daemon logs
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p ollama-diagnostics
          sudo journalctl -u ollama --no-pager -n 500 > ollama-diagnostics/journal.log 2>&1 || true
          cp /tmp/ollama-serve.log ollama-diagnostics/ 2>/dev/null || true
          ollama --version > ollama-diagnostics/version.txt 2>&1 || true
          dmesg --ctime 2>/dev/null | tail -n 100 > ollama-diagnostics/dmesg-tail.log || true

      - name: Upload Ollama daemon logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ollama-diagnostics
          path: ollama-diagnostics/
          retention-days: 14
          if-no-files-found: ignore

  onepassword-cli:
    name: 1Password CLI contract (real binary, no account)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @graphorin/secret-1password (turbo builds its dependencies)
        run: pnpm exec turbo run build --filter=@graphorin/secret-1password

      # Pinned official binary from 1Password's canonical distribution host
      # (no third-party action): version + sha256 move together on bumps.
      - name: Install the 1Password CLI
        run: |
          set -euo pipefail
          curl -fsSLo op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v2.35.0/op_linux_amd64_v2.35.0.zip"
          echo "4457ade59850b852c64c77164235b34dd0b984ef7826eb0ccd32f1fd78a2ceb7  op.zip" | sha256sum -c -
          unzip -o op.zip op
          sudo install -m 0755 op /usr/local/bin/op
          op --version

      # GRAPHORIN_RUN_OP_INTEGRATION=1 arms the real-binary leg in
      # tests/op-cli.test.ts: an isolated OP_CONFIG_DIR forces the
      # deterministic 'no accounts configured' state, so the leg proves the
      # spawn argv parses (the P1 failure mode died at flag parsing, before
      # any auth check) without needing any 1Password secret.
      - name: Run the op contract suite against the real binary
        run: |
          set -euo pipefail
          GRAPHORIN_RUN_OP_INTEGRATION=1 pnpm --filter @graphorin/secret-1password exec \
            vitest run tests/op-cli.test.ts \
            --reporter=default --reporter=json --outputFile=op-vitest.json

      # Guard against a silent no-op: the real-binary test must have RUN and
      # passed, not been collected as skipped (which is what happens when the
      # opt-in env var gets lost).
      - name: Assert the real-binary leg actually ran
        run: |
          set -euo pipefail
          jq -e '
            [.testResults[].assertionResults[]
             | select(.title | contains("account/auth stage"))
             | select(.status == "passed")]
            | length == 1
          ' packages/secret-1password/op-vitest.json

  # 1.0 criterion 6, local half: a REPRODUCIBLE quality baseline for a
  # local provider path. Pinned Ollama runtime (same checksum-verified
  # artifact as ollama-doctor), pinned model tag, content-hashed
  # committed dataset, stamped subject/judge specs - every axis a
  # future run needs to reproduce the numbers is in the report itself.
  # HONESTY CONTRACT: quality numbers are PUBLISHED (step summary +
  # artifact), not gated - n=3 with a 0.6b model is a reproducibility
  # baseline, not a quality claim (and it is stamped selfJudged: the
  # subject grades itself, labelled as such). What DOES gate:
  # infrastructure honesty - a provider/judge failure exits non-zero
  # (INFRASTRUCTURE_FAILED / JUDGE_FAILED escape --gate-on regressions
  # by design), and the evidence stamps must be present in the report.
  longmemeval-ollama-baseline:
    name: LongMemEval local baseline (qwen3:0.6b, published not gated)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the benchmark runner (turbo builds its dependencies)
        run: pnpm exec turbo run build --filter=@graphorin/benchmark-longmemeval

      - name: Install and start Ollama (pinned artifact, checksum-verified)
        env:
          # Same pin discipline as ollama-doctor - bump both together.
          OLLAMA_VERSION: 0.32.0
          OLLAMA_SHA256: 56362d7609dfa9e35aaebb7c9cab25605d8f0528ec3d5d585dc83d6642002bab
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/ollama.tar.zst \
            "https://github.com/ollama/ollama/releases/download/v${OLLAMA_VERSION}/ollama-linux-amd64.tar.zst"
          echo "${OLLAMA_SHA256}  /tmp/ollama.tar.zst" | sha256sum -c -
          mkdir -p "${HOME}/ollama-dist"
          tar --zstd -xf /tmp/ollama.tar.zst -C "${HOME}/ollama-dist"
          rm /tmp/ollama.tar.zst
          echo "${HOME}/ollama-dist/bin" >> "${GITHUB_PATH}"
          export PATH="${HOME}/ollama-dist/bin:${PATH}"
          ollama --version
          (nohup ollama serve >/tmp/ollama-serve.log 2>&1 &)
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:11434/api/version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo 'Ollama daemon did not become reachable' >&2
          cat /tmp/ollama-serve.log 2>/dev/null || true
          exit 1

      - name: Pull and warm the model
        run: |
          set -euo pipefail
          ollama pull qwen3:0.6b
          warm() { ollama run qwen3:0.6b "Reply with the single word OK."; }
          if ! warm; then
            echo 'warm-up failed once; retrying after 5s' >&2
            sleep 5
            warm
          fi

      - name: Run the baseline (full-context, smoke scale, self-judged)
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/ollama-baseline"
          # --gate-on regressions with NO --baseline: quality misses do
          # not fail the job; INFRASTRUCTURE_FAILED / JUDGE_FAILED still
          # force a non-zero exit (0.13.13 contract). full-context mode
          # keeps the leg embedder-free; think:false keeps the 0.6b
          # subject from burning its budget on the hidden chain. NO
          # --judge-provider on purpose: the SUT grades itself and the
          # report stamps selfJudged (the honest label for a
          # one-model leg); --allow-self-judge acknowledges it for the
          # --json write.
          node benchmarks/longmemeval/dist/runner.js \
            --provider ollama --model qwen3:0.6b --allow-self-judge \
            --mode full-context --smoke --think false --timeout-ms 300000 \
            --gate-on regressions \
            --results "${RUNNER_TEMP}/ollama-baseline/RESULTS.md" \
            --json "${RUNNER_TEMP}/ollama-baseline/report.json"

      - name: Assert the evidence stamps and publish the numbers
        run: |
          set -euo pipefail
          R="${RUNNER_TEMP}/ollama-baseline/report.json"
          jq -e '.benchConfig.datasetSha256 | length == 64' "$R" > /dev/null
          jq -e '.benchConfig.subjectSpec.model == "qwen3:0.6b"' "$R" > /dev/null
          jq -e '.benchConfig.selfJudged == true' "$R" > /dev/null
          jq -e '.summary.passRateCi.lo != null' "$R" > /dev/null
          echo "evidence stamps OK (datasetSha256, subjectSpec, selfJudged, passRateCi)"
          {
            echo "## LongMemEval local baseline (qwen3:0.6b, self-judged, n=$(jq -r '.summary.total' "$R"))"
            echo ""
            echo "Reproducibility baseline, NOT a quality claim: pinned runtime + model + hashed dataset."
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Pass | $(jq -r '.summary.passed' "$R")/$(jq -r '.summary.total' "$R") (95% CI $(jq -r '(.summary.passRateCi.lo * 100 | floor)' "$R")%-$(jq -r '(.summary.passRateCi.hi * 100 | floor)' "$R")%) |"
            echo "| Dataset sha256 | \`$(jq -r '.benchConfig.datasetSha256' "$R" | head -c 16)...\` |"
            echo "| Subject / judge | $(jq -r '.benchConfig.provider' "$R") / $(jq -r '.benchConfig.judge' "$R") (self-judged) |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload the baseline report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: longmemeval-ollama-baseline
          path: ${{ runner.temp }}/ollama-baseline/
          retention-days: 90

      - name: Ollama server log (on failure)
        if: failure()
        run: tail -n 100 /tmp/ollama-serve.log || true

  notify-on-failure:
    needs: [docker-sandbox, ollama-doctor, onepassword-cli, longmemeval-ollama-baseline]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yml
