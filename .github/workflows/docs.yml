name: Docs

# Docs build + link check is part of the per-commit signal so any
# regression in the docs pipeline (typedoc input, vitepress config,
# pnpm overrides feeding vite/esbuild, …) is caught at PR time, not
# on the next nightly schedule. The deploy job below stays gated on
# `main` — it publishes on a push/merge to `main` or a manual
# `workflow_dispatch` re-run, so PR and scheduled runs only execute the
# build + link-check stages.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly at 03:11 UTC so docs drift on long-quiet branches is
    # still caught daily even when no PR has touched the tree.
    - cron: '11 3 * * *'

# The deploy job is gated on the `CLOUDFLARE_API_TOKEN` and
# `CLOUDFLARE_ACCOUNT_ID` repository secrets. Until those secrets are
# provisioned the deploy is a no-op and emits a warning, mirroring the
# `release.yml` `RELEASE_ENABLED` gating pattern. Provisioning order:
#
#   1. Create a Cloudflare Pages project named `graphorin-docs`.
#   2. Add the custom domain `docs.graphorin.com` on the Cloudflare side.
#   3. Provision repository secrets `CLOUDFLARE_API_TOKEN` (with the
#      "Pages: Edit" template) and `CLOUDFLARE_ACCOUNT_ID`.
#   4. Re-run the workflow from the Actions tab.

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages (typings for TypeDoc)
        run: pnpm -r --filter "./packages/**" build

      - name: Build documentation site (sync + TypeDoc + VitePress + llms.txt)
        run: pnpm --filter @graphorin/docs run build:site

      # W-059: the benchmarks page is generated from the committed
      # benchConfig-stamped reports; a hand-edited number (or a report
      # change without regeneration) fails here.
      - name: Benchmark results page freshness (regen + diff)
        run: node documentation/scripts/build-benchmark-results.mjs

      # W-128: documentation/api (the TypeDoc output) is COMMITTED for
      # GitHub readers, code search, and LLM ingestion, but was only
      # regenerated at version bumps - a PR changing public API or
      # TSDoc between releases silently left the committed tree stale.
      # build:site above just regenerated it (build:typedoc +
      # build:sanitise normalize the output), so any diff or untracked
      # page here means the PR forgot the regeneration. Release commits
      # remain noisy (2826 files) - an accepted trade-off for a tree
      # that is always fresh. The nightly cron catches drift on quiet
      # branches.
      - name: API reference freshness (regen + diff)
        run: |
          if ! git diff --exit-code --stat -- documentation/api; then
            echo "--- first 200 lines of the content diff (for diagnosis) ---"
            git diff -- documentation/api | head -200
            echo "::error title=documentation/api is stale::Public API/TSDoc changed without regenerating the committed reference. Run: pnpm --filter @graphorin/docs run clean && pnpm --filter @graphorin/docs run build:typedoc && pnpm --filter @graphorin/docs run build:sanitise, then commit documentation/api."
            exit 1
          fi
          untracked="$(git status --porcelain -- documentation/api)"
          if [ -n "$untracked" ]; then
            echo "$untracked"
            echo "::error title=documentation/api has uncommitted pages::New generated pages must be committed (same regeneration command as above)."
            exit 1
          fi

      # Deep-retest 0.13.1 P2: build:site rewrites the root-synced pages
      # (documentation/reference/changelog.md and contributing/*) from
      # their repository-root sources on every build. When a release
      # edits /CHANGELOG.md without re-running the sync, the committed
      # page goes stale: local builds dirty the tree and the deployed
      # site diverges from git. The api/ and benchmark freshness gates
      # above have their own diagnostics; this is the catch-all for
      # every other tracked file the build may touch.
      - name: Docs tree purity (build must not change committed files)
        run: |
          if ! git diff --exit-code --stat -- documentation; then
            git diff -- documentation | head -100
            echo "::error title=docs build changed committed files::A generated page is stale (usually the root-synced changelog). Run: node documentation/scripts/sync-root-docs.mjs and commit the result."
            exit 1
          fi

      # The public API reference must describe behaviour, not internal
      # planning artifacts: audit/work-item ids ("deep retest P1-3",
      # "W-135", wave letters) leaked into published pages once (0.13.0
      # deep retest). The source docblocks were swept; this keeps them
      # swept.
      - name: API wording gate (no internal audit labels)
        run: node scripts/check-api-wording.mjs

      # Docs payload budget: the client-side local-search index once
      # grew to 6.8 MiB because the generated API reference was fully
      # indexed. The API pages are excluded in .vitepress/config.ts
      # (_render); this budget catches any regression that would ship a
      # multi-megabyte index to every visitor again.
      - name: Docs payload budget (client search index)
        run: |
          idx="$(find documentation/.vitepress/dist/assets/chunks -name '@localSearchIndex*.js' | head -1)"
          if [ -z "$idx" ]; then
            echo "::error title=search index chunk not found::expected an @localSearchIndex*.js chunk under .vitepress/dist/assets/chunks"
            exit 1
          fi
          size="$(stat -c%s "$idx")"
          echo "client search index chunk: $idx (${size} bytes)"
          if [ "$size" -gt 2097152 ]; then
            echo "::error title=search index over budget::${size} bytes > 2 MiB - keep the API reference out of the client index (see .vitepress/config.ts search options._render)"
            exit 1
          fi

      # E10 (docs-14): --include-fragments makes lychee validate #anchors
      # against the target page's heading ids - without it seven broken
      # in-site anchors (VitePress slugifies '_' to '-') sailed through.
      #
      # The check runs in offline FILE mode, not against a preview server:
      # with a server + --base-url, lychee resolves every same-page '#foo'
      # link against the base URL root instead of the page it appears on,
      # so all heading anchors false-fail. In file mode '#foo' resolves
      # against the containing file; --root-dir resolves the
      # site-root-relative hrefs VitePress emits under `cleanUrls: true`;
      # --fallback-extensions maps those extensionless URLs to their
      # backing .html files; --offline drops every remote target, which
      # keeps the link check network-free.
      - name: Link check (lychee, offline file mode)
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --no-progress
            --offline
            --include-fragments
            --root-dir ${{ github.workspace }}/documentation/.vitepress/dist
            --fallback-extensions html
            ./documentation/.vitepress/dist/**/*.html
          fail: true

      - name: Upload built site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-dist
          path: documentation/.vitepress/dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Deploy only from `main`, on either a real push/merge OR a manual
    # `workflow_dispatch` re-run from the Actions tab (the recovery path
    # the header comment + the "secrets not provisioned" step point to).
    # PR and scheduled runs still build + link-check only.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # wrangler-action detects `pnpm-lock.yaml` at repo root and shells out to
      # `pnpm dlx wrangler ...`, so we need pnpm on PATH even though we never
      # run `pnpm install` in this job.
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'

      - name: Download built site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docs-dist
          path: documentation/.vitepress/dist

      - name: Skip deploy — Cloudflare secrets not provisioned yet
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "::warning title=Docs deploy skipped::Repository secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID are not set. The build artefact is uploaded; once the secrets land, re-run this workflow to publish docs.graphorin.com."

      - name: Publish to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        # We're inside a pnpm workspace at the repo root, so a bare
        # `pnpm add wrangler` (which wrangler-action runs to install Wrangler)
        # bails out with ERR_PNPM_ADDING_TO_ROOT. Allow it just for this step.
        env:
          NPM_CONFIG_IGNORE_WORKSPACE_ROOT_CHECK: 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy documentation/.vitepress/dist --project-name=graphorin-docs --branch=main

      # Audit 2026-07-16 (P0-1): the external audit caught the LIVE site
      # serving three different versions at once (a v0.6.1 quickstart footer
      # next to v0.9.0 pages) while every repo-side gate was green - a
      # deploy/CDN-cache failure mode only a probe of the published URLs can
      # see. Poll the key pages until their footer carries the version this
      # run just deployed; fail loudly instead of leaving stale pages up.
      - name: Post-deploy version smoke (live pages serve the deployed version)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          set -euo pipefail
          version="v$(node -p "require('./package.json').version")"
          for path in guide/ guide/quickstart guide/installation; do
            ok=0
            for i in $(seq 1 18); do
              if curl -fsS -H 'Cache-Control: no-cache' "https://docs.graphorin.com/${path}" | grep -q "${version}"; then
                echo "OK: /${path} serves ${version} (probe ${i})"
                ok=1
                break
              fi
              sleep 10
            done
            if [ "${ok}" != "1" ]; then
              echo "::error title=Stale docs deploy::https://docs.graphorin.com/${path} still does not serve ${version} after 180s - CDN cache or deploy drift (the 2026-07-16 audit failure mode)."
              exit 1
            fi
          done

  # E3: the nightly cron is what catches docs drift on quiet branches - a
  # silent red run defeats it.
  notify-on-failure:
    needs: [build]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yml
