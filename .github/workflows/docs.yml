name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# The deploy job is gated on the `CLOUDFLARE_API_TOKEN` and
# `CLOUDFLARE_ACCOUNT_ID` repository secrets. Until those secrets are
# provisioned the deploy is a no-op and emits a warning, mirroring the
# existing `release.yml` `NPM_TOKEN` pattern. Provisioning order:
#
#   1. Create a Cloudflare Pages project named `graphorin-docs`.
#   2. Add the custom domain `docs.graphorin.com` on the Cloudflare side.
#   3. Provision repository secrets `CLOUDFLARE_API_TOKEN` (with the
#      "Pages: Edit" template) and `CLOUDFLARE_ACCOUNT_ID`.
#   4. Re-run the workflow from the Actions tab.

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework packages (typings for TypeDoc)
        run: pnpm -r --filter "./packages/**" build

      - name: Build documentation site (sync + TypeDoc + VitePress + llms.txt)
        run: pnpm --filter @graphorin/docs run build:site

      # VitePress emits site-root-relative URLs (/guide, /reference/changelog, …)
      # because `cleanUrls: true` is on. Plain offline lychee resolves those as
      # file:/// at the filesystem root, and a vanilla static server can't rewrite
      # extensionless URLs to their backing .html files. `vitepress preview` does
      # the rewrite the same way Cloudflare Pages will, so we serve dist over
      # loopback and point lychee at it. The exclude regex keeps the link check
      # offline (any non-loopback http(s) target is dropped).
      - name: Start VitePress preview server for link check
        run: |
          nohup pnpm --filter @graphorin/docs exec vitepress preview . \
            --host 127.0.0.1 --port 8765 \
            >/tmp/docs-preview.log 2>&1 &
          echo $! > /tmp/docs-preview.pid
          for _ in $(seq 1 60); do
            curl -sf "http://127.0.0.1:8765/" >/dev/null && echo "preview is up" && exit 0
            sleep 1
          done
          echo 'preview log:' >&2 && cat /tmp/docs-preview.log >&2 || true
          exit 1

      - name: Link check (lychee, loopback-only)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude '.*'
            --include '^http://127\.0\.0\.1:8765'
            --base-url http://127.0.0.1:8765/
            ./documentation/.vitepress/dist/**/*.html
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop VitePress preview server
        if: always()
        run: kill "$(cat /tmp/docs-preview.pid)" 2>/dev/null || true

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: documentation/.vitepress/dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # wrangler-action detects `pnpm-lock.yaml` at repo root and shells out to
      # `pnpm dlx wrangler ...`, so we need pnpm on PATH even though we never
      # run `pnpm install` in this job.
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: documentation/.vitepress/dist

      - name: Skip deploy — Cloudflare secrets not provisioned yet
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "::warning title=Docs deploy skipped::Repository secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID are not set. The build artefact is uploaded; once the secrets land, re-run this workflow to publish docs.graphorin.com."

      - name: Publish to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy documentation/.vitepress/dist --project-name=graphorin-docs --branch=main
