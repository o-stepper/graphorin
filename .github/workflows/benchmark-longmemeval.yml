name: LongMemEval benchmark

# Tier 2 of the three-tier eval cadence (B1):
#   1. PR-smoke  — deterministic, offline, every PR (root `benchmark:ci`; runs the
#                  stub fixtures, fails hard, no LLM-judge, no real cost).
#   2. weekly real-provider — THIS workflow: LLM-judged real-provider run against
#                  the gated datasets, per-ability regression gates. Dispatch-only
#                  by default (a meaningful run needs a real Provider key + the
#                  large datasets, which would bust offline/`check-no-network` and
#                  cost money); a maintainer enables a weekly `schedule:` trigger
#                  here once the provider secrets are wired.
#   3. release-full — full sweep + baseline comparison at release (added with the
#                  first npm publication; out of scope until the release contour
#                  goes live).
# Trigger manually from the Actions tab; pick a real `provider` to get real numbers
# (default `stub` is plumbing-only).
on:
  workflow_dispatch:
    inputs:
      loader:
        description: Dataset loader
        type: choice
        default: longmemeval
        options:
          - longmemeval
          - locomo
          - dmr
      dataset_file:
        description: File under benchmarks/.datasets/ to evaluate
        type: string
        default: longmemeval_s.json
      variant:
        description: LongMemEval variant (S or M)
        type: string
        default: S
      provider:
        description: Provider to evaluate (stub = plumbing-only, no real numbers)
        type: choice
        default: stub
        options:
          - stub
          - ollama
          - llamacpp
          - openai-compatible
      model:
        description: Model id for a real provider (ignored for stub)
        type: string
        default: ''

concurrency:
  group: longmemeval-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  longmemeval:
    name: LongMemEval (dispatch-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Enable Corepack (activates pnpm pinned in package.json)
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Networked download is allowed only here: this is a dev/CI script under
      # scripts/, never imported by packages/*/src, so `check-no-network` stays
      # green. Gated sources are supplied via repo secrets (env overrides).
      - name: Fetch eval datasets
        env:
          LOADER: ${{ inputs.loader }}
          GRAPHORIN_LONGMEMEVAL_S_URL: ${{ secrets.GRAPHORIN_LONGMEMEVAL_S_URL }}
          GRAPHORIN_LOCOMO_URL: ${{ secrets.GRAPHORIN_LOCOMO_URL }}
          GRAPHORIN_DMR_URL: ${{ secrets.GRAPHORIN_DMR_URL }}
        run: node scripts/fetch-eval-datasets.mjs --only "$LOADER"

      # Per-category (ability) regression gates: each ability is compared against
      # its committed baseline under benchmarks/longmemeval/baselines/ via
      # detectRegressions (maxPassRateDropPct 5, maxAvgScoreDrop 0.05). Missing
      # baselines are skipped (seed them from the emitted reports/). `--gate-on
      # regressions` fails the job only on a baseline regression. Inputs are
      # passed via env (never interpolated into the shell) to avoid injection.
      #
      # The runner resolves its Provider from --provider (default `stub` =
      # plumbing-only, no real numbers). Select a real provider in the dispatch
      # form and supply its endpoint/key as repo secrets to produce real
      # LongMemEval numbers; the emitted RESULTS header records which provider
      # ran. PROVIDER/MODEL/base-url/key all flow via env (never interpolated
      # into the shell) to avoid injection.
      - name: Run per-ability regression gates
        env:
          LOADER: ${{ inputs.loader }}
          DATASET_FILE: ${{ inputs.dataset_file }}
          VARIANT: ${{ inputs.variant }}
          PROVIDER: ${{ inputs.provider }}
          GRAPHORIN_BENCH_MODEL: ${{ inputs.model }}
          GRAPHORIN_BENCH_BASE_URL: ${{ secrets.GRAPHORIN_BENCH_BASE_URL }}
          GRAPHORIN_BENCH_API_KEY: ${{ secrets.GRAPHORIN_BENCH_API_KEY }}
        run: |
          set -u
          DATASET="benchmarks/.datasets/$DATASET_FILE"
          REPORTS="benchmarks/longmemeval/reports"
          BASELINES="benchmarks/longmemeval/baselines"
          mkdir -p "$REPORTS"
          status=0
          for ability in info-extraction multi-session temporal knowledge-update abstention; do
            echo "::group::ability=$ability"
            node benchmarks/longmemeval/dist/runner.js \
              --provider "$PROVIDER" \
              --loader "$LOADER" \
              --dataset "$DATASET" \
              --variant "$VARIANT" \
              --ability "$ability" \
              --json "$REPORTS/$LOADER.$ability.json" \
              --baseline "$BASELINES/$LOADER.$ability.json" \
              --gate-on regressions || status=1
            echo "::endgroup::"
          done
          exit $status
