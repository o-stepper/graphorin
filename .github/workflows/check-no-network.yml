name: Check no implicit network calls

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-no-network:
    name: Static guard for the no-phone-home promise
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies (no postinstall scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run check-no-network
        run: pnpm run check-no-network
