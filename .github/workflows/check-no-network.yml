name: Check no implicit network calls

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-no-network-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check-no-network:
    name: Static guard for the no-phone-home promise
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies (no postinstall scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run check-no-network
        run: pnpm run check-no-network
