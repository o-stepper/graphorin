name: Check no implicit network calls

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-no-network-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check-no-network:
    name: Static guard for the no-phone-home promise
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies (no postinstall scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run check-no-network
        run: pnpm run check-no-network
