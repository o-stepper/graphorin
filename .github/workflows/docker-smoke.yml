name: Docker image smoke

# CI-11: the distribution Dockerfile (examples/docker/Dockerfile) was never
# built in CI, so a regression in it broke users rather than a badge. This job
# builds the image from a clean checkout and proves the server boots and
# answers /v1/health. It runs on demand and weekly — NOT on every PR — because
# a full multi-package image build is slow and the Dockerfile changes rarely.

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC.
    - cron: '0 6 * * 1'

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-health:
    name: docker build + /v1/health
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build the distribution image
        run: docker build -f examples/docker/Dockerfile -t graphorin:smoke .

      - name: CLI smoke (entrypoint + symlinked binary)
        run: docker run --rm graphorin:smoke --version

      # deep-retest-0.13.11: publish an SBOM of what actually ships -
      # scanners and consumers audit the artifact instead of guessing
      # from the npm graph. Binary pinned by version AND sha256
      # (osv-scanner precedent in security.yml). Floor calibrated for
      # the pruned production-closure image (~88 dpkg + ~51 npm
      # store entries measured on 0.14.0): it guards against a
      # catastrophically empty scan, not against normal size drift.
      - name: Generate image SBOM (syft, pinned)
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/syft.tar.gz \
            https://github.com/anchore/syft/releases/download/v1.34.2/syft_1.34.2_linux_amd64.tar.gz
          echo "b62a3d4167f9a04bc190a5e654b05711737527ed47b616dc398e541f903c2d72  /tmp/syft.tar.gz" | sha256sum -c -
          tar -xzf /tmp/syft.tar.gz -C /tmp syft
          /tmp/syft scan docker:graphorin:smoke -o spdx-json > "${RUNNER_TEMP}/graphorin-image.spdx.json"
          node -e "
            const sbom = require(process.env.RUNNER_TEMP + '/graphorin-image.spdx.json');
            const n = (sbom.packages ?? []).length;
            if (n < 60) { console.error('SBOM suspiciously small: ' + n + ' packages'); process.exit(1); }
            console.log('SBOM OK: ' + n + ' packages catalogued');
          "

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: graphorin-image-sbom
          path: ${{ runner.temp }}/graphorin-image.spdx.json
          retention-days: 90

      # deep-retest 0.13.12: an SBOM without a verdict is visibility, not
      # a gate - scan the EXACT artifact and fail on fixable
      # critical/high findings. Debian fixes are applied at build time
      # (apt-get upgrade) and the npm toolchain is removed from the
      # runtime stage, so a red run here means a real, actionable
      # advisory in what actually ships. Binary pinned by version AND
      # sha256 (syft/osv-scanner precedent).
      - name: Vulnerability-scan the image (grype, pinned, fail on fixable high)
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/grype.tar.gz \
            https://github.com/anchore/grype/releases/download/v0.116.0/grype_0.116.0_linux_amd64.tar.gz
          echo "40aff724297312f91ea390d003bed8d8651c74cc7f5b26732db80b3a408d2fc5  /tmp/grype.tar.gz" | sha256sum -c -
          tar -xzf /tmp/grype.tar.gz -C /tmp grype
          /tmp/grype "sbom:${RUNNER_TEMP}/graphorin-image.spdx.json" \
            --fail-on high --only-fixed

      - name: Boot the server with the shipped config and probe the published port
        run: |
          set -euo pipefail
          # W-098: run EXACTLY the README recipe - the committed
          # examples/docker/config.example.json (0.0.0.0 bind, /data storage,
          # token auth + encrypted store via file: secret refs) under the
          # documented hardening flags, with throwaway secrets mounted at
          # /run/secrets/graphorin. The probe hits the PUBLISHED port from
          # the runner host, so a 127.0.0.1 bind or a wrong storage path
          # fails here even while the in-container HEALTHCHECK (which probes
          # 127.0.0.1 inside) would keep reporting healthy. The old inline
          # config could never catch that class. (The previous
          # -e GRAPHORIN_CONFIG is gone: no such variable exists - the CMD
          # passes --config.)
          # deep-retest 0.13.12 P2: the old recipe chmod'ed the secrets
          # 0644 and then collected the server's own "should be 0600"
          # warnings by construction. The clean non-root pattern for
          # bind-mounted secrets: owned by the container user (uid/gid
          # 10001), mode 0400 - readable by exactly one uid, no
          # permission warnings. Mirrors examples/docker/README.md.
          # Order matters: the file glob must expand BEFORE the directory
          # is locked to uid 10001 - once the dir is 0500/10001 the
          # runner's shell can no longer list it and `gsecrets/*` stays
          # a literal star (first dispatch failed exactly there).
          mkdir -p "${RUNNER_TEMP}/gsecrets"
          openssl rand -hex 32 > "${RUNNER_TEMP}/gsecrets/pepper"
          openssl rand -hex 32 > "${RUNNER_TEMP}/gsecrets/db-passphrase"
          openssl rand -hex 32 > "${RUNNER_TEMP}/gsecrets/audit-passphrase"
          sudo chmod 0400 "${RUNNER_TEMP}/gsecrets"/*
          sudo chown -R 10001:10001 "${RUNNER_TEMP}/gsecrets"
          sudo chmod 0500 "${RUNNER_TEMP}/gsecrets"
          docker run -d --name graphorin-smoke \
            --read-only --tmpfs /tmp \
            --security-opt no-new-privileges \
            --cap-drop=ALL \
            -v graphorin-data:/data \
            -v "${GITHUB_WORKSPACE}/examples/docker/config.example.json:/etc/graphorin/config.json:ro" \
            -v "${RUNNER_TEMP}/gsecrets:/run/secrets/graphorin:ro" \
            -p 8080:8080 \
            graphorin:smoke
          # 45s window: the encrypted store's KDF makes first boot slower
          # than the old plaintext smoke.
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:8080/v1/health >/dev/null 2>&1; then
              echo "health OK after ${i}s (published port, from the runner host):"
              curl -fsS http://localhost:8080/v1/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::/v1/health did not become ready within 45s"
          exit 1

      # operations.md runbook drill: prove backup -> destroy -> restore
      # end-to-end on the exact shipped artifact. Data proof = an auth
      # token minted BEFORE the backup must verify (via `token list`)
      # AFTER the original volume is destroyed and a fresh volume is
      # seeded from nothing but the backup file - tokens live in the
      # main store, so a hollow restore cannot pass. The raw token is
      # discarded (never logged). The shipped config enables the
      # ENCRYPTED store, so the backup is the stopped-server byte-copy
      # mode: stop the server first, then back up via a one-shot
      # helper container on the same volume. No `docker cp`: the
      # backup lands on the data volume and moves between volumes via
      # a helper container (docker cp cannot see tmpfs mounts).
      - name: Backup/restore runbook drill (data survives a volume wipe)
        run: |
          set -euo pipefail
          docker exec graphorin-smoke graphorin token create \
            --scopes agent:run --label smoke-drill --config /etc/graphorin/config.json > /dev/null
          docker exec graphorin-smoke graphorin token list \
            --config /etc/graphorin/config.json --json | grep -q 'smoke-drill'
          # Encrypted store => stopped-server backup (runbook order).
          docker stop graphorin-smoke
          docker run --rm \
            -v graphorin-data:/data \
            -v "${GITHUB_WORKSPACE}/examples/docker/config.example.json:/etc/graphorin/config.json:ro" \
            -v "${RUNNER_TEMP}/gsecrets:/run/secrets/graphorin:ro" \
            graphorin:smoke storage backup /data/drill-backup.db --config /etc/graphorin/config.json
          docker rm -f graphorin-smoke
          # Seed a FRESH volume with only the backup file (runbook step:
          # restore the file as storage.path with tight permissions; a
          # fresh volume has no stale -wal/-shm sidecars by
          # construction), then destroy the original volume entirely.
          docker volume create graphorin-data-restored
          docker run --rm --entrypoint sh \
            -v graphorin-data:/old:ro \
            -v graphorin-data-restored:/data \
            graphorin:smoke -c 'cp /old/drill-backup.db /data/data.db && chmod 0600 /data/data.db'
          docker volume rm graphorin-data
          # Reboot with the same recipe against the restored volume.
          docker run -d --name graphorin-smoke \
            --read-only --tmpfs /tmp \
            --security-opt no-new-privileges \
            --cap-drop=ALL \
            -v graphorin-data-restored:/data \
            -v "${GITHUB_WORKSPACE}/examples/docker/config.example.json:/etc/graphorin/config.json:ro" \
            -v "${RUNNER_TEMP}/gsecrets:/run/secrets/graphorin:ro" \
            -p 8080:8080 \
            graphorin:smoke
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:8080/v1/health >/dev/null 2>&1; then
              echo "restored server healthy after ${i}s"
              break
            fi
            if [ "$i" = "45" ]; then
              echo "::error::restored server did not become ready within 45s"
              exit 1
            fi
            sleep 1
          done
          # The token minted before the backup must still be there.
          docker exec graphorin-smoke graphorin token list \
            --config /etc/graphorin/config.json --json | grep -q 'smoke-drill'
          echo "backup/restore drill OK: pre-backup token survived the volume wipe"

      - name: Container logs (on failure)
        if: failure()
        run: docker logs graphorin-smoke || true

      - name: Teardown
        if: always()
        run: |
          docker rm -f graphorin-smoke || true
          docker volume rm -f graphorin-data graphorin-data-restored || true

  # E3: a red weekly run must not die silently in the Actions tab - this is
  # the exact CI-11 regression class this workflow exists to catch.
  notify-on-failure:
    needs: [build-and-health]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yml
