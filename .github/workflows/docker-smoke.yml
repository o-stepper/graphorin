name: Docker image smoke

# CI-11: the distribution Dockerfile (examples/docker/Dockerfile) was never
# built in CI, so a regression in it broke users rather than a badge. This job
# builds the image from a clean checkout and proves the server boots and
# answers /v1/health. It runs on demand and weekly — NOT on every PR — because
# a full multi-package image build is slow and the Dockerfile changes rarely.

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC.
    - cron: '0 6 * * 1'

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-health:
    name: docker build + /v1/health
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build the distribution image
        run: docker build -f examples/docker/Dockerfile -t graphorin:smoke .

      - name: CLI smoke (entrypoint + symlinked binary)
        run: docker run --rm graphorin:smoke --version

      # deep-retest-0.13.11: the image carries the full builder tree
      # (documented size/devDependency trade-off), so publish an SBOM of
      # what actually ships - scanners and consumers audit the artifact
      # instead of guessing from the npm graph. Binary pinned by version
      # AND sha256 (osv-scanner precedent in security.yml).
      - name: Generate image SBOM (syft, pinned)
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/syft.tar.gz \
            https://github.com/anchore/syft/releases/download/v1.34.2/syft_1.34.2_linux_amd64.tar.gz
          echo "b62a3d4167f9a04bc190a5e654b05711737527ed47b616dc398e541f903c2d72  /tmp/syft.tar.gz" | sha256sum -c -
          tar -xzf /tmp/syft.tar.gz -C /tmp syft
          /tmp/syft scan docker:graphorin:smoke -o spdx-json > "${RUNNER_TEMP}/graphorin-image.spdx.json"
          node -e "
            const sbom = require(process.env.RUNNER_TEMP + '/graphorin-image.spdx.json');
            const n = (sbom.packages ?? []).length;
            if (n < 100) { console.error('SBOM suspiciously small: ' + n + ' packages'); process.exit(1); }
            console.log('SBOM OK: ' + n + ' packages catalogued');
          "

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: graphorin-image-sbom
          path: ${{ runner.temp }}/graphorin-image.spdx.json
          retention-days: 90

      - name: Boot the server with the shipped config and probe the published port
        run: |
          set -euo pipefail
          # W-098: run EXACTLY the README recipe - the committed
          # examples/docker/config.example.json (0.0.0.0 bind, /data storage,
          # token auth + encrypted store via file: secret refs) under the
          # documented hardening flags, with throwaway secrets mounted at
          # /run/secrets/graphorin. The probe hits the PUBLISHED port from
          # the runner host, so a 127.0.0.1 bind or a wrong storage path
          # fails here even while the in-container HEALTHCHECK (which probes
          # 127.0.0.1 inside) would keep reporting healthy. The old inline
          # config could never catch that class. (The previous
          # -e GRAPHORIN_CONFIG is gone: no such variable exists - the CMD
          # passes --config.)
          mkdir -p "${RUNNER_TEMP}/gsecrets"
          openssl rand -hex 32 > "${RUNNER_TEMP}/gsecrets/pepper"
          openssl rand -hex 32 > "${RUNNER_TEMP}/gsecrets/db-passphrase"
          openssl rand -hex 32 > "${RUNNER_TEMP}/gsecrets/audit-passphrase"
          chmod 0644 "${RUNNER_TEMP}/gsecrets"/*
          docker run -d --name graphorin-smoke \
            --read-only --tmpfs /tmp \
            --security-opt no-new-privileges \
            --cap-drop=ALL \
            -v graphorin-data:/data \
            -v "${GITHUB_WORKSPACE}/examples/docker/config.example.json:/etc/graphorin/config.json:ro" \
            -v "${RUNNER_TEMP}/gsecrets:/run/secrets/graphorin:ro" \
            -p 8080:8080 \
            graphorin:smoke
          # 45s window: the encrypted store's KDF makes first boot slower
          # than the old plaintext smoke.
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:8080/v1/health >/dev/null 2>&1; then
              echo "health OK after ${i}s (published port, from the runner host):"
              curl -fsS http://localhost:8080/v1/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::/v1/health did not become ready within 45s"
          exit 1

      - name: Container logs (on failure)
        if: failure()
        run: docker logs graphorin-smoke || true

      - name: Teardown
        if: always()
        run: docker rm -f graphorin-smoke || true

  # E3: a red weekly run must not die silently in the Actions tab - this is
  # the exact CI-11 regression class this workflow exists to catch.
  notify-on-failure:
    needs: [build-and-health]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yml
