name: Feature request
description: Suggest a new capability or enhancement for Graphorin.
title: 'feat: <one-line summary>'
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an enhancement. Please describe the *user-facing problem* first; the implementation idea is optional.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user scenario that motivates this request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have a specific API or behaviour in mind, sketch it here.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Which part of Graphorin would this affect?
      multiple: true
      options:
        - '@graphorin/core'
        - '@graphorin/security'
        - '@graphorin/observability'
        - '@graphorin/pricing'
        - '@graphorin/store-sqlite'
        - '@graphorin/embedder-transformersjs'
        - '@graphorin/embedder-ollama'
        - '@graphorin/triggers'
        - '@graphorin/provider'
        - '@graphorin/provider-llamacpp-node'
        - '@graphorin/tools'
        - '@graphorin/skills'
        - '@graphorin/mcp'
        - '@graphorin/memory'
        - '@graphorin/sessions'
        - '@graphorin/agent'
        - '@graphorin/workflow'
        - '@graphorin/server'
        - '@graphorin/cli'
        - '@graphorin/protocol'
        - '@graphorin/client'
        - '@graphorin/eslint-plugin'
        - 'Optional packages'
        - 'Examples / docs'
        - 'Tooling / CI'
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and discussions to confirm this is not already proposed.
          required: true
