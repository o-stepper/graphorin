name: Bug report
description: Report a defect in Graphorin so we can fix it.
title: 'bug: <one-line summary>'
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please complete every section below — the more context you provide, the faster we can reproduce and fix the issue.

  - type: input
    id: graphorin_version
    attributes:
      label: Graphorin version
      description: The version of the affected `@graphorin/*` package(s).
      placeholder: '0.1.0'
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: 'v22.10.0'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the actual behaviour you observed.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps that reproduce the problem. A standalone snippet is ideal.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack traces
      description: Paste any relevant error output. Redact secrets and PII before submitting.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: My report contains no secrets, credentials, or PII.
          required: true
