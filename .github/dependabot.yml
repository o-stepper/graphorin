version: 2

# Renovate handles npm dependency updates (see renovate.json).
# Dependabot is responsible *only* for GitHub Actions and security alerts.
# We disable the npm ecosystem here so the two bots do not race.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    # deep-retest 0.13.12 P3: a short maturity window for routine action
    # bumps (supply-chain hygiene: freshly published releases are the
    # highest-risk window). Dependabot SECURITY updates ignore version-
    # update configs, so advisory-driven fixes still arrive immediately.
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore(actions)'
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
