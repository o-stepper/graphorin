# Graphorin Kubernetes deployment template (Phase 15).
#
# Apply with:
#   kubectl create namespace graphorin
#   kubectl apply -n graphorin -f examples/k8s/deployment.yaml
#
# The template assumes:
#   - the operator built + pushed the image from `examples/docker/Dockerfile`
#     and tagged it `ghcr.io/<org>/graphorin:0.12.0`
#   - a Secret `graphorin-secrets` exists in the same namespace with
#     keys `pepper`, `db-passphrase`, `audit-passphrase`
#   - a PVC `graphorin-data` exists for the SQLite store
#
# `securityContext` mirrors the framework's process-hardening discipline
# (DEC-135) and the Pod Security Standards "restricted" profile.

apiVersion: v1
kind: ConfigMap
metadata:
  name: graphorin-config
  labels:
    app.kubernetes.io/name: graphorin
    app.kubernetes.io/version: "0.12.0"
data:
  config.json: |
    {
      "server": {
        "host": "0.0.0.0",
        "port": 8080,
        "trustProxy": true
      },
      "auth": {
        "kind": "token",
        "pepperRef": "file:/run/secrets/graphorin/pepper"
      },
      "storage": {
        "path": "/data/graphorin/data.db",
        "mode": "server",
        "encryption": {
          "enabled": true,
          "passphraseRef": "file:/run/secrets/graphorin/db-passphrase"
        }
      },
      "audit": {
        "enabled": true,
        "passphraseRef": "file:/run/secrets/graphorin/audit-passphrase"
      },
      "secrets": {
        "source": "encrypted-file",
        "strict": true
      },
      "metrics": {
        "requireAuth": true
      },
      "observability": {
        "logger": "json"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphorin
  labels:
    app.kubernetes.io/name: graphorin
    app.kubernetes.io/version: "0.12.0"
spec:
  # SQLite is single-writer: do NOT raise replicas above 1. `Recreate`
  # (not RollingUpdate) guarantees the old pod releases the RWO volume
  # and the DB file before the new one starts.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: graphorin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphorin
        app.kubernetes.io/version: "0.12.0"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: graphorin
          image: ghcr.io/o-stepper/graphorin:0.12.0
          imagePullPolicy: IfNotPresent
          # `--config` is the only way the CLI selects a config file; there is
          # no GRAPHORIN_CONFIG env var. Note the standalone daemon serves the
          # health / metrics / tokens / agents / runs / workflows / ws / sse
          # surface; the memory / sessions / skills / mcp / audit REST routes
          # mount only when the server is embedded with the matching domain
          # adapters (see the standalone-server guide).
          args: ["start", "--config", "/etc/graphorin/config.json"]
          env:
            - name: NODE_ENV
              value: production
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # startupProbe gives slow first boots (schema migrations on a large
          # DB) up to 5 minutes before liveness takes over and could kill the
          # pod mid-migration.
          startupProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/graphorin
              readOnly: true
            - name: secrets
              mountPath: /run/secrets/graphorin
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: graphorin-data
        # 0440 (not 0400, and not YAML-1.2 `0o` octal, which kubectl's
        # YAML-1.1 parser reads as a string): the files are root-owned with
        # fsGroup 10001, so the group-read bit is what lets the non-root
        # process (uid 10001) read its config and secret material.
        - name: config
          configMap:
            name: graphorin-config
            defaultMode: 0440
        - name: secrets
          projected:
            defaultMode: 0440
            sources:
              - secret:
                  name: graphorin-secrets
                  items:
                    - key: pepper
                      path: pepper
                    - key: db-passphrase
                      path: db-passphrase
                    - key: audit-passphrase
                      path: audit-passphrase
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: graphorin
  labels:
    app.kubernetes.io/name: graphorin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: graphorin
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
