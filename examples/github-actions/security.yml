# GitHub Actions security workflow distribution template (Phase 15).
#
# Mirrors the framework's supply-chain discipline (DEC-140 / ADR-034):
# `pnpm audit` blocks the build on any High/Critical advisory not allowlisted
# via `pnpm.auditConfig.ignoreCves` / `ignoreGhsas` in package.json, and
# `pnpm audit signatures` verifies the npm Sigstore provenance attestations on
# every downloaded package.
#
# Drop into `.github/workflows/security.yml` of a repository that
# consumes the @graphorin/* packages.
#
# @stable

name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 02:17 UTC — catches advisories published overnight.
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pnpm audit + provenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions pinned to a commit SHA (see this template's README) — re-pin on
      # a deliberate bump.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: pnpm install (frozen)
        run: pnpm install --frozen-lockfile

      # Allow known-acceptable advisories via pnpm's own config in package.json:
      #   "pnpm": { "auditConfig": { "ignoreCves": ["CVE-..."], "ignoreGhsas": ["GHSA-..."] } }
      # (there is no separate `audit-ignore.json` mechanism in pnpm).
      - name: pnpm audit (high + critical)
        run: pnpm audit --prod --audit-level=high

      # `pnpm audit signatures` only exists on newer pnpm; guard it so a
      # consumer on an older pnpm gets a warning, not a hard failure.
      - name: pnpm audit signatures (npm Sigstore provenance)
        run: |
          if pnpm audit signatures --help >/dev/null 2>&1; then
            pnpm audit signatures --prod || echo "::warning::pnpm audit signatures reported issues; review before release."
          else
            echo "pnpm audit signatures not available in this pnpm version; skipping."
          fi

      # `check-no-network` is a Graphorin-monorepo script; a downstream app
      # will not have it unless it adopted the guard. Skip-with-notice rather
      # than fail on a script that does not exist in the consumer repo.
      - name: Verify no implicit network calls (DEC-154)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['check-no-network'] ? 0 : 1)"; then
            pnpm run check-no-network
          else
            echo "no check-no-network script in this repo; skipping (see Graphorin's scripts/check-no-network.mjs to adopt it)."
          fi
