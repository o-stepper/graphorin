# GitHub Actions release workflow distribution template (Phase 15).
#
# Drives Changesets-based releases of the @graphorin/* packages with
# Sigstore provenance attached on every published tarball. Mirrors the
# release pipeline the framework itself uses.
#
# Required repository secrets:
#   - NPM_TOKEN  — npm registry token with publish access.
#
# Drop into `.github/workflows/release.yml`.
#
# @stable

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build + publish via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Actions are pinned to a commit SHA (with a `# vX` comment) — the
      # practice this template's README recommends and the framework's own
      # workflows follow. Bump deliberately; re-pin the SHA when you do.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # pnpm comes from the `packageManager` field via Corepack — no separate
      # (and harder-to-pin) `pnpm/action-setup` action needed.
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: pnpm install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Run all tests
        run: pnpm -r run test
        env:
          CI: "true"

      # `check-no-network` is a Graphorin-monorepo script; a downstream app
      # will not have it unless it adopted the guard. Skip-with-notice rather
      # than fail on a script that does not exist in the consumer repo.
      - name: Verify no implicit network calls (DEC-154)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['check-no-network'] ? 0 : 1)"; then
            pnpm run check-no-network
          else
            echo "no check-no-network script in this repo; skipping (see Graphorin's scripts/check-no-network.mjs to adopt it)."
          fi

      - name: Create Release Pull Request or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run release
          version: pnpm run version
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
